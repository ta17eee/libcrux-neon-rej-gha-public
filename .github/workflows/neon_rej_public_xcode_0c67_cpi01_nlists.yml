name: NEON rejection sampler public Xcode 0c67 CPI01 nlists

"on":
  workflow_dispatch:

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  cpi01-nlists:
    name: ${{ matrix.probe.label }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        probe:
          - label: 0c67 ordinary CPI01 nlists
            artifact_suffix: 0c67-ordinary-cpi01-nlists
            ref: 0c67a85b028f74bac401f6adf14581b2e05104e1
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --test nistkats --no-run
            preferred_object_prefix: nistkats-
            target_hash: h8997d6f42564fb09
            target_offset_hex: "0x2d3c"
            target_feature_flags: ""
            expected_bytes: "fc 03 03 aa"
            corrupt_bytes: "fc 0f 01 aa"
            near_literals: "lCPI203_1,lCPI203_2"
            cpi_prefix: "lCPI203_"
          - label: 0c67 plus-neon CPI01 nlists
            artifact_suffix: 0c67-plus-neon-cpi01-nlists
            ref: 0c67a85b028f74bac401f6adf14581b2e05104e1
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --test nistkats --no-run
            preferred_object_prefix: nistkats-
            target_hash: h8997d6f42564fb09
            target_offset_hex: "0x2d3c"
            target_feature_flags: "-C target_feature=+neon"
            expected_bytes: "fc 03 03 aa"
            corrupt_bytes: "fc 7f 00 aa"
            near_literals: "lCPI210_1,lCPI210_2"
            cpi_prefix: "lCPI210_"

    steps:
      - name: Checkout probe repository
        uses: actions/checkout@v4
        with:
          path: probe-repo

      - name: Checkout public upstream libcrux
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: ${{ matrix.probe.ref }}
          path: libcrux

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        working-directory: libcrux
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Install historical toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Build and probe CPI01 nlist perturbations
        working-directory: libcrux
        env:
          PROBE_LABEL: ${{ matrix.probe.label }}
          PROBE_ARTIFACT_SUFFIX: ${{ matrix.probe.artifact_suffix }}
          PROBE_TARGET_FEATURE_FLAGS: ${{ matrix.probe.target_feature_flags }}
          PROBE_TARGET_HASH: ${{ matrix.probe.target_hash }}
          PROBE_TARGET_OFFSET_HEX: ${{ matrix.probe.target_offset_hex }}
          PROBE_PREFERRED_OBJECT_PREFIX: ${{ matrix.probe.preferred_object_prefix }}
          PROBE_CARGO_ARGS: ${{ matrix.probe.cargo_args }}
          PROBE_EXPECTED_BYTES: ${{ matrix.probe.expected_bytes }}
          PROBE_CORRUPT_BYTES: ${{ matrix.probe.corrupt_bytes }}
          PROBE_NEAR_LITERALS: ${{ matrix.probe.near_literals }}
          PROBE_CPI_PREFIX: ${{ matrix.probe.cpi_prefix }}
          PROBE_CPI_SUBSET_MODE: cpi01_nlists
          PROBE_EXTRA_LD_VARIANTS: "ld_new_no_deduplicate:-no_deduplicate"
          PROBE_COMPACT_ARTIFACTS: "1"
        run: |
          python3 ../probe-repo/.github/scripts/target_near_literal_zero_probe.py

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-0c67-cpi01-nlists-${{ matrix.probe.artifact_suffix }}
          path: libcrux/neon-rej-diagnostics/**
