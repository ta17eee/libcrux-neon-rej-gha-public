name: NEON rejection sampler public Xcode PR287 scalar guard pair sweep

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/neon_rej_public_xcode_pr287_scalar_guard_pair_sweep.yml
      - .github/scripts/retarget_macho_relocs.py
      - .github/scripts/scan_pr287_bad_word.py
      - .github/scripts/summarize_pr287_pair_sweep.py
      - .github/scripts/patch_pr287_rejsample_scalar_guard.py

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  pr287-scalar-guard-pair-sweep:
    name: pr287 scalar-guard pair retarget sweep
    runs-on: macos-14

    steps:
      - name: Checkout probe repository
        uses: actions/checkout@v4
        with:
          path: harness

      - name: Checkout public upstream libcrux at PR287 fallback commit
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: 76ab582c79998d5ef77e6e6b6d287c6b1ff0106d
          path: libcrux

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        working-directory: libcrux
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Re-enable NEON rejection sampler with scalar guard
        working-directory: libcrux
        run: |
          perl -0pi -e 's#// mod rejsample;#mod rejsample;#' polynomials-aarch64/src/lib.rs
          perl -0pi -e 's#rej_sample\(a, out\)#rejsample::rej_sample(a, out)#' polynomials-aarch64/src/lib.rs
          python3 ../harness/.github/scripts/patch_pr287_rejsample_scalar_guard.py
          git diff -- polynomials-aarch64/src/lib.rs polynomials-aarch64/src/rejsample.rs

      - name: Install historical toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Build and sweep relocation-retargeted pairs
        working-directory: libcrux
        env:
          DEVELOPER_DIR: /Applications/Xcode_15.0.1.app/Contents/Developer
          RUSTFLAGS: -C save-temps -C debuginfo=2
        run: |
          set -o pipefail
          diag="neon-rej-diagnostics/pr287-scalar-guard-pair-sweep"
          pattern_words="0xce162400 0x6e3b1fa2 0xce1b3ba3 0xce0e2842 0xce0a2063 0x6e2b1ea4 0xce0b36a5 0xce0d3c84 0x4e803241 0xce0f40b2 0xce1c1b25 0x4eb11e3c 0x4eb61ed1 0x3dc1efe7 0xce1a1cb8 0xce88fc42"
          mkdir -p "${diag}/variants"
          {
            echo "label=pr287 scalar-guard pair retarget sweep"
            echo "developer_dir=${DEVELOPER_DIR}"
            sw_vers
            uname -a
            xcodebuild -version
            xcrun --find cc
            xcrun --find ld
            xcrun --show-sdk-path
            ld -v || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
          } | tee "${diag}/toolchain.log"

          cargo +1.78.0 test \
            --manifest-path libcrux-ml-kem/Cargo.toml \
            --release \
            --test nistkats \
            --no-run \
            2>&1 | tee "${diag}/build.log"

          bin="$(pwd)/$(find target/release/deps -maxdepth 1 -type f -perm +111 -name 'nistkats-*' | head -n 1)"
          test -x "${bin}"
          python3 ../harness/.github/scripts/scan_pr287_bad_word.py \
            --root target/release/deps \
            --bin "${bin}" \
            --pattern-words "${pattern_words}" \
            --bad-word 0x4e803241 \
            --bad-index 8 \
            --out "${diag}/cargo-final-scan.json" \
            2>&1 | tee "${diag}/cargo-final-scan.log"

          selected_obj="$(
            python3 -c 'import json; d=json.load(open("'"${diag}/cargo-final-scan.json"'")); print(next(e["path"] for e in d["interesting_files"] if "Mach-O 64-bit object" in e["kind"] and e["wildcard_context_match_count"]))'
          )"
          test -f "${selected_obj}"
          cp "${selected_obj}" "${diag}/selected.o"
          nm -nm "${selected_obj}" | grep 'lCPI233_' | tee "${diag}/lcpi233-symbols.txt"
          awk '/lCPI233_/ { print $NF }' "${diag}/lcpi233-symbols.txt" | tee "${diag}/lcpi233-targets.txt"
          rustlib="$(rustc +1.78.0 --print target-libdir)"
          compiler_builtins="$(ls "${rustlib}"/libcompiler_builtins-*.rlib | head -n 1)"
          test -f "${compiler_builtins}"
          {
            echo "selected_obj=${selected_obj}"
            file "${selected_obj}" || true
            shasum -a 256 "${selected_obj}" || true
            echo "rustlib=${rustlib}"
            echo "compiler_builtins=${compiler_builtins}"
          } | tee "${diag}/selected-object.log"

          make_original_variant() {
            local out_dir="${diag}/variants/original"
            mkdir -p "${out_dir}"
            cp "${selected_obj}" "${out_dir}/input.o"
            echo '{"changes":[]}' > "${out_dir}/retarget.json"
          }

          make_pair_variant() {
            local idx="$1"
            local label="pair_to_lcpi233_${idx}"
            local out_dir="${diag}/variants/${label}"
            mkdir -p "${out_dir}"
            python3 ../harness/.github/scripts/retarget_macho_relocs.py \
              --input "${selected_obj}" \
              --output "${out_dir}/input.o" \
              --out-json "${out_dir}/retarget.json" \
              --map 14471="lCPI233_${idx}" \
              --map 14470="lCPI233_${idx}" \
              2>&1 | tee "${out_dir}/retarget.log"
          }

          relink_variant() {
            local label="$1"
            local out_dir="${diag}/variants/${label}"
            local obj="${out_dir}/input.o"
            local manual_bin_abs="$(pwd)/${out_dir}/nistkats.manual"
            local manual_map="${out_dir}/nistkats.manual.map"
            local manual_link_log="${out_dir}/link.log"
            local args=(
              -arch arm64
              -nodefaultlibs
              -o "${manual_bin_abs}"
              "${obj}"
              "${compiler_builtins}"
              -L "$(pwd)/target/release/deps"
              -L "${rustlib}"
              -liconv
              -lSystem
              -lc
              -lm
              -Wl,-dead_strip
              -Wl,-map,"${manual_map}"
            )
            {
              printf 'DEVELOPER_DIR=%q xcrun cc' "${DEVELOPER_DIR}"
              printf ' %q' "${args[@]}"
              echo
            } | tee "${out_dir}/command.log"
            if DEVELOPER_DIR="${DEVELOPER_DIR}" xcrun cc "${args[@]}" > "${manual_link_log}" 2>&1; then
              echo "manual_link_status=0" | tee "${out_dir}/meta.log"
            else
              status=$?
              echo "manual_link_status=${status}" | tee "${out_dir}/meta.log"
              return 0
            fi
            python3 ../harness/.github/scripts/scan_pr287_bad_word.py \
              --root "${out_dir}" \
              --bin "${manual_bin_abs}" \
              --pattern-words "${pattern_words}" \
              --bad-word 0x4e803241 \
              --bad-index 8 \
              --out "${out_dir}/scan.json" \
              2>&1 | tee "${out_dir}/scan.log"
            otool -tvV "${manual_bin_abs}" | grep -A 1 -B 1 '1000ccff8' > "${out_dir}/decode.txt" || true
          }

          make_original_variant
          while IFS= read -r symbol; do
            idx="${symbol#lCPI233_}"
            case "${idx}" in
              ""|*[!0-9]*)
                continue
                ;;
            esac
            if [ "${idx}" -le 31 ]; then
              make_pair_variant "${idx}"
            fi
          done < "${diag}/lcpi233-targets.txt"

          for variant_dir in "${diag}/variants"/*; do
            relink_variant "$(basename "${variant_dir}")"
          done

          python3 ../harness/.github/scripts/summarize_pr287_pair_sweep.py \
            --variants-root "${diag}/variants" \
            --out-json "${diag}/pair-sweep-summary.json" \
            --out-md "${diag}/pair-sweep-summary.md"

          {
            echo "# PR287 pair retarget sweep"
            echo
            echo "## cargo final"
            cat "${diag}/cargo-final-scan.log"
            echo
            echo "## pair sweep"
            cat "${diag}/pair-sweep-summary.md"
          } | tee "${diag}/summary.md"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-pr287-scalar-guard-pair-sweep
          path: |
            libcrux/neon-rej-diagnostics/**/*.json
            libcrux/neon-rej-diagnostics/**/*.log
            libcrux/neon-rej-diagnostics/**/*.md
            libcrux/neon-rej-diagnostics/**/*.txt
