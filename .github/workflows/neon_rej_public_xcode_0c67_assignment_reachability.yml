name: NEON rejection sampler public Xcode 0c67 assignment reachability

"on":
  workflow_dispatch:

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  assignment-reachability:
    name: 0c67 assignment reachability ${{ matrix.variant }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            extra_rustflags: ""
          - variant: no_pie
            extra_rustflags: "-C link-arg=-Wl,-no_pie"
          - variant: ld_classic
            extra_rustflags: "-C link-arg=-Wl,-ld_classic"

    steps:
      - name: Checkout public upstream libcrux
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: 0c67a85b028f74bac401f6adf14581b2e05104e1

      - name: Runner details
        run: |
          sw_vers
          uname -a
          sysctl hw.optional.AdvSIMD || true
          sysctl hw.optional.arm.AdvSIMD || true
          DEVELOPER_DIR=/Applications/Xcode_15.0.1.app/Contents/Developer xcodebuild -version || true
          DEVELOPER_DIR=/Applications/Xcode_15.0.1.app/Contents/Developer xcrun --find cc || true
          DEVELOPER_DIR=/Applications/Xcode_15.0.1.app/Contents/Developer xcrun --find ld || true
          DEVELOPER_DIR=/Applications/Xcode_15.0.1.app/Contents/Developer ld -v || true
          DEVELOPER_DIR=/Applications/Xcode_15.0.1.app/Contents/Developer ld -version_details || true
          rustc --version || true
          cargo --version || true
          lldb --version || true

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        id: patch_deps
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Install historical toolchain
        id: install_toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Probe 0c67 assignment reachability
        if: ${{ always() && steps.patch_deps.outcome == 'success' && steps.install_toolchain.outcome == 'success' }}
        run: |
          set +e
          developer_dir="/Applications/Xcode_15.0.1.app/Contents/Developer"
          variant="${{ matrix.variant }}"
          extra_rustflags="${{ matrix.extra_rustflags }}"
          out_dir="$PWD/neon-rej-diagnostics/0c67-assignment-reachability-${variant}"
          mkdir -p "$out_dir"
          summary="$out_dir/summary.md"
          test_filter="kyber1024_nist_known_answer_tests"
          target_hash="h8997d6f42564fb09"
          assign_offset_hex="0x2d3c"
          copy_offset_dec="812"

          {
            echo "# 0c67 assignment reachability probe"
            echo
            echo "Commit: \`0c67a85b028f74bac401f6adf14581b2e05104e1\`"
            echo "Xcode: \`xcode-15.0.1\`"
            echo "Variant: \`${variant}\`"
            echo "Extra RUSTFLAGS: \`${extra_rustflags}\`"
            echo "Focused test: \`${test_filter}\`"
            echo "Assignment target: \`generate_keypair17${target_hash} + ${assign_offset_hex}\`"
            echo "Copy target: \`generate_keypair17${target_hash} + ${copy_offset_dec}\`"
            echo
            echo "## Runner and toolchain"
            echo
            echo "\`\`\`text"
            sw_vers
            uname -a
            sysctl hw.optional.AdvSIMD || true
            sysctl hw.optional.arm.AdvSIMD || true
            DEVELOPER_DIR="${developer_dir}" xcodebuild -version || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find cc || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find ld || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find llvm-objdump || true
            DEVELOPER_DIR="${developer_dir}" ld -v || true
            DEVELOPER_DIR="${developer_dir}" ld -version_details || true
            DEVELOPER_DIR="${developer_dir}" xcrun --sdk macosx --show-sdk-path || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
            lldb --version || true
            echo "\`\`\`"
            echo
          } > "$summary" 2>&1

          add_hex() {
            python3 - "$1" "$2" <<'PY'
          import sys
          print(f"0x{int(sys.argv[1], 16) + int(sys.argv[2], 0):x}")
          PY
          }

          run_with_timeout() {
            local seconds="$1"
            local log="$2"
            shift 2
            "$@" > "$log" 2>&1 &
            local pid=$!
            (
              sleep "$seconds"
              if kill -0 "$pid" 2>/dev/null; then
                echo "TIMEOUT after ${seconds}s: $*" >> "$log"
                kill -TERM "$pid" 2>/dev/null || true
                sleep 5
                kill -KILL "$pid" 2>/dev/null || true
              fi
            ) &
            local watchdog=$!
            wait "$pid"
            local status=$?
            kill "$watchdog" 2>/dev/null || true
            wait "$watchdog" 2>/dev/null || true
            return "$status"
          }

          find_test_binary() {
            local candidate
            for candidate in target/release/deps/nistkats-*; do
              if [ -f "$candidate" ] && file "$candidate" | grep -q 'Mach-O.*executable'; then
                printf '%s\n' "$candidate"
                return 0
              fi
            done
            return 1
          }

          extract_target_line() {
            local path="$1"
            local target_addr="$2"
            local out_base="$3"
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
              --macho \
              --arch=arm64 \
              --demangle \
              --disassemble \
              "$path" > "${out_base}.disassembly.txt" 2>&1
            python3 - "${out_base}.disassembly.txt" "$target_addr" > "${out_base}.target-line.txt" <<'PY'
          import re
          import sys
          path, target_s = sys.argv[1:]
          target = int(target_s, 16)
          pat = re.compile(r"^\s*([0-9a-fA-F]+):")
          with open(path, "r", errors="replace") as f:
              for line in f:
                  m = pat.match(line)
                  if m and int(m.group(1), 16) == target:
                      print(line.rstrip())
                      raise SystemExit(0)
          raise SystemExit(1)
          PY
          }

          make_lldb_commands() {
            local assign_addr="$1"
            local copy_addr="$2"
            local window_addr="$3"
            local cmd_file="$out_dir/reachability.lldb.commands"
            {
              printf '%s\n' "settings set -- target.run-args ${test_filter} --exact --nocapture --test-threads=1"
              printf '%s\n' 'settings set stop-disassembly-display never'
              printf '%s\n' 'process launch --stop-at-entry'
              printf 'breakpoint set --address %s\n' "$assign_addr"
              printf 'breakpoint set --address %s\n' "$copy_addr"
              printf '%s\n' 'breakpoint list'
              printf '%s\n' 'continue'
              printf '%s\n' 'script print("=== assignment before step ===")'
              printf '%s\n' 'process status'
              printf '%s\n' 'breakpoint list'
              printf '%s\n' 'thread backtrace all'
              printf '%s\n' 'register read pc sp x0 x1 x2 x3 x8 x9 x20 x22 x25 x28 x30'
              printf '%s\n' 'memory read --format x --size 8 --count 8 $sp+184'
              printf "%s\n" "disassemble --start-address ${window_addr} --count 32"
              printf '%s\n' 'thread step-inst'
              printf '%s\n' 'script print("=== assignment after single-step ===")'
              printf '%s\n' 'process status'
              printf '%s\n' 'register read pc sp x0 x1 x2 x3 x8 x9 x20 x22 x25 x28 x30'
              printf '%s\n' 'memory read --format x --size 8 --count 8 $sp+184'
              for event in 1 2 3 4; do
                printf '%s\n' 'continue'
                printf '%s\n' "script print(\"=== event ${event} after assignment ===\")"
                printf '%s\n' 'process status'
                printf '%s\n' 'breakpoint list'
                printf '%s\n' 'thread backtrace all'
                printf '%s\n' 'register read pc sp x0 x1 x2 x3 x8 x9 x20 x22 x25 x28 x30'
                printf '%s\n' 'memory read --format x --size 8 --count 8 $sp+184'
                printf '%s\n' 'disassemble --frame --count 24'
                printf '%s\n' 'image lookup -a $pc'
              done
            } > "$cmd_file"
            printf '%s\n' "$cmd_file"
          }

          rustflags="-C save-temps ${extra_rustflags}"
          {
            echo "## Build"
            echo
            echo "- RUSTFLAGS: \`${rustflags}\`"
          } >> "$summary"

          cargo +1.78.0 clean >> "$summary" 2>&1
          DEVELOPER_DIR="${developer_dir}" \
            RUSTFLAGS="${rustflags}" \
            cargo +1.78.0 test --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --no-run \
            > "$out_dir/build.log" 2>&1
          build_status=$?
          echo "- build exit: \`${build_status}\`" >> "$summary"

          if [ "$build_status" -ne 0 ]; then
            {
              echo
              echo "### Build failure tail"
              echo
              echo "\`\`\`text"
              tail -n 160 "$out_dir/build.log"
              echo "\`\`\`"
            } >> "$summary"
            cat "$summary"
            exit 0
          fi

          bin="$(find_test_binary)"
          if [ -z "$bin" ]; then
            echo "selected binary missing" >> "$summary"
            cat "$summary"
            exit 1
          fi
          bin_abs="$(cd "$(dirname "$bin")" && pwd)/$(basename "$bin")"
          nm -nm "$bin_abs" > "$out_dir/final.nm.txt" 2>&1
          symbol_addr="$(awk -v h="$target_hash" '$0 ~ h { print $1; exit }' "$out_dir/final.nm.txt")"
          assign_addr="$(add_hex "0x${symbol_addr}" "$assign_offset_hex")"
          copy_addr="$(add_hex "0x${symbol_addr}" "$copy_offset_dec")"
          window_addr="$(add_hex "$assign_addr" "-0x30")"
          extract_target_line "$bin_abs" "$assign_addr" "$out_dir/final.assign"
          extract_target_line "$bin_abs" "$copy_addr" "$out_dir/final.copy"

          run_with_timeout 120 "$out_dir/direct-test.log" \
            "$bin_abs" "${test_filter}" --exact --nocapture --test-threads=1
          direct_status=$?

          cmd_file="$(make_lldb_commands "$assign_addr" "$copy_addr" "$window_addr")"
          run_with_timeout 240 "$out_dir/reachability.lldb.log" \
            lldb --batch -s "$cmd_file" -- "$bin_abs"
          lldb_status=$?

          {
            echo
            echo "## Target"
            echo
            echo "- selected binary: \`${bin_abs}\`"
            echo "- symbol address: \`0x${symbol_addr}\`"
            echo "- assignment address: \`${assign_addr}\`"
            echo "- copy address: \`${copy_addr}\`"
            echo
            echo "### Assignment target line"
            echo
            echo "\`\`\`text"
            cat "$out_dir/final.assign.target-line.txt"
            echo "\`\`\`"
            echo
            echo "### Copy target line"
            echo
            echo "\`\`\`text"
            cat "$out_dir/final.copy.target-line.txt"
            echo "\`\`\`"
            echo
            echo "## Direct focused test"
            echo
            echo "- direct exit: \`${direct_status}\`"
            echo
            echo "\`\`\`text"
            tail -n 80 "$out_dir/direct-test.log"
            echo "\`\`\`"
            echo
            echo "## LLDB reachability"
            echo
            echo "- lldb exit: \`${lldb_status}\`"
            echo "- assignment/copy breakpoint lines: \`$(grep -Ec 'stop reason = breakpoint|hit count = [1-9]' "$out_dir/reachability.lldb.log" || true)\`"
            echo "- signal/exit lines: \`$(grep -Eic 'SIGSEGV|EXC_BAD|exited with status|exited normally|stop reason' "$out_dir/reachability.lldb.log" || true)\`"
            echo
            echo "### LLDB selected lines"
            echo
            echo "\`\`\`text"
            grep -E 'assignment before|assignment after|event [0-9]+ after|stop reason|hit count|thread #|frame #0|pc =|sp =|x0 =|x1 =|x2 =|x3 =|x8 =|x9 =|x20 =|x22 =|x25 =|x28 =|x30 =|EXC_BAD_ACCESS|Process .* exited|test result:' "$out_dir/reachability.lldb.log" || true
            echo "\`\`\`"
          } >> "$summary"

          cat "$summary"
          exit 0

      - name: Upload 0c67 assignment reachability diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-0c67-assignment-reachability-${{ matrix.variant }}
          path: neon-rej-diagnostics/0c67-assignment-reachability-${{ matrix.variant }}
