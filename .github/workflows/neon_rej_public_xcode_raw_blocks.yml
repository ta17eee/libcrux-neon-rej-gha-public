name: NEON rejection sampler public Xcode raw blocks

"on":
  workflow_dispatch:

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  raw-blocks:
    name: raw blocks ${{ matrix.xcode_label }} (${{ matrix.case_id }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - case_id: b9fa21c6-pk-validation
            commit_short: b9fa21c6
            commit: b9fa21c6d53dc2b7de2e50d1694af284cb55f769
            bin_glob: libcrux_ml_kem-*
            test_filter: mlkem768::tests::pk_validation
            xcode_label: xcode-15.0.1
            developer_dir: /Applications/Xcode_15.0.1.app/Contents/Developer
          - case_id: b9fa21c6-pk-validation
            commit_short: b9fa21c6
            commit: b9fa21c6d53dc2b7de2e50d1694af284cb55f769
            bin_glob: libcrux_ml_kem-*
            test_filter: mlkem768::tests::pk_validation
            xcode_label: xcode-15.4
            developer_dir: /Applications/Xcode_15.4.app/Contents/Developer
          - case_id: 0c67a85b-kat1024
            commit_short: 0c67a85b
            commit: 0c67a85b028f74bac401f6adf14581b2e05104e1
            bin_glob: nistkats-*
            test_filter: kyber1024_nist_known_answer_tests
            xcode_label: xcode-15.0.1
            developer_dir: /Applications/Xcode_15.0.1.app/Contents/Developer
          - case_id: 0c67a85b-kat1024
            commit_short: 0c67a85b
            commit: 0c67a85b028f74bac401f6adf14581b2e05104e1
            bin_glob: nistkats-*
            test_filter: kyber1024_nist_known_answer_tests
            xcode_label: xcode-15.4
            developer_dir: /Applications/Xcode_15.4.app/Contents/Developer
          - case_id: 76ab582c-fallback-kat1024
            commit_short: 76ab582c
            commit: 76ab582c79998d5ef77e6e6b6d287c6b1ff0106d
            bin_glob: nistkats-*
            test_filter: kyber1024_nist_known_answer_tests
            xcode_label: xcode-15.0.1
            developer_dir: /Applications/Xcode_15.0.1.app/Contents/Developer

    steps:
      - name: Checkout public upstream libcrux
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: ${{ matrix.commit }}

      - name: Runner details
        run: |
          sw_vers
          uname -a
          sysctl hw.optional.AdvSIMD || true
          sysctl hw.optional.arm.AdvSIMD || true
          xcode-select -p || true
          ls -1d /Applications/Xcode*.app 2>/dev/null || true
          xcodebuild -version || true
          rustc --version || true
          cargo --version || true
          lldb --version || true

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        id: patch_deps
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Install historical toolchain
        id: install_toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Collect focused raw blocks
        if: ${{ always() && steps.patch_deps.outcome == 'success' && steps.install_toolchain.outcome == 'success' }}
        run: |
          set +e
          developer_dir="${{ matrix.developer_dir }}"
          out_dir="$PWD/neon-rej-diagnostics/raw-blocks-${{ matrix.commit_short }}-${{ matrix.xcode_label }}"
          mkdir -p "$out_dir"
          summary="$out_dir/summary.md"
          failure=0

          {
            echo "# Xcode raw block probe"
            echo
            echo "Commit: \`${{ matrix.commit }}\`"
            echo "Case: \`${{ matrix.case_id }}\`"
            echo "Xcode: \`${{ matrix.xcode_label }}\`"
            echo "Developer dir: \`${developer_dir}\`"
            echo "Binary glob: \`${{ matrix.bin_glob }}\`"
            echo "Focused test filter: \`${{ matrix.test_filter }}\`"
            echo
            echo "## Runner and toolchain"
            echo
            echo "\`\`\`text"
            sw_vers
            uname -a
            sysctl hw.optional.AdvSIMD || true
            sysctl hw.optional.arm.AdvSIMD || true
            DEVELOPER_DIR="${developer_dir}" xcodebuild -version || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find cc || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find ld || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find llvm-objdump || true
            DEVELOPER_DIR="${developer_dir}" xcrun --sdk macosx --show-sdk-path || true
            DEVELOPER_DIR="${developer_dir}" cc --version || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
            lldb --version || true
            echo "\`\`\`"
            echo
          } > "$summary" 2>&1

          if [ ! -d "${developer_dir}" ]; then
            echo "Selected Xcode is absent; cannot collect raw blocks." >> "$summary"
            cat "$summary"
            exit 1
          fi

          run_with_timeout() {
            local seconds="$1"
            local log="$2"
            shift 2
            "$@" > "$log" 2>&1 &
            local pid=$!
            (
              sleep "$seconds"
              if kill -0 "$pid" 2>/dev/null; then
                echo "TIMEOUT after ${seconds}s: $*" >> "$log"
                kill -TERM "$pid" 2>/dev/null || true
                sleep 5
                kill -KILL "$pid" 2>/dev/null || true
              fi
            ) &
            local watchdog=$!
            wait "$pid"
            local status=$?
            kill "$watchdog" 2>/dev/null || true
            wait "$watchdog" 2>/dev/null || true
            return "$status"
          }

          find_test_binary() {
            local pattern="$1"
            local candidate
            for candidate in target/release/deps/${pattern}; do
              if [ -f "$candidate" ] && file "$candidate" | grep -q 'Mach-O.*executable'; then
                printf '%s\n' "$candidate"
                return 0
              fi
            done
            return 1
          }

          emit_context_hits() {
            local in_file="$1"
            local out_file="$2"
            perl -0ne '
              my @lines = split /\n/;
              my %want;
              for my $i (0 .. $#lines) {
                if ($lines[$i] =~ /\bb\s+0xff[0-9a-f]+|stp\s+q1,\s*q0,\s*\[x8\]|ldr\s+x9,\s*\[sp,\s*#184\]|add\s+x8,\s*x8,\s*x9,\s*lsl\s*#9|bl\s+.*rej_sample|mov\s+w30,\s*#3329/) {
                  for my $j ($i - 12 .. $i + 12) {
                    $want{$j} = 1 if $j >= 0 && $j <= $#lines;
                  }
                }
              }
              for my $i (sort { $a <=> $b } keys %want) {
                printf "%7d: %s\n", $i + 1, $lines[$i];
              }
            ' "$in_file" > "$out_file"
          }

          collect_binary_blocks() {
            local bin_abs="$1"
            local mode="$2"
            local nm_file="$out_dir/${mode}.nm-nm.txt"
            local symbol_list="$out_dir/${mode}.symbols.txt"
            local objdump_file="$out_dir/${mode}.objdump-symbols-raw.txt"
            local hits_file="$out_dir/${mode}.objdump-hit-context.txt"
            local full_branch_context="$out_dir/${mode}.full-disassembly-low-branch-context.txt"
            local branch_file="$out_dir/${mode}.bad-branch-hits.txt"

            nm -nm "$bin_abs" > "$nm_file" 2>&1
            nm -m "$bin_abs" > "$out_dir/${mode}.nm-m.txt" 2>&1

            grep -E 'generate_keypair|rej_sample|sample_matrix|serialize_public_key|serialize_secret_key|ind_cpa' "$nm_file" \
              > "$symbol_list" 2>&1 || true

            {
              echo "### ${mode} binary metadata"
              echo
              echo "\`\`\`text"
              file "$bin_abs" || true
              shasum -a 256 "$bin_abs" || true
              otool -hv "$bin_abs" || true
              otool -l "$bin_abs" | awk '/LC_BUILD_VERSION|LC_VERSION_MIN_MACOSX/{p=1} p{print} p && /ntools/{p=0}' || true
              echo "\`\`\`"
              echo
              echo "### ${mode} selected symbols"
              echo
              echo "\`\`\`text"
              cat "$symbol_list"
              echo "\`\`\`"
              echo
            } >> "$summary" 2>&1

            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump --version \
              > "$out_dir/${mode}.llvm-objdump-version.txt" 2>&1

            : > "$objdump_file"
            while IFS= read -r symbol; do
              [ -n "$symbol" ] || continue
              {
                echo
                echo "================================================================================"
                echo "symbol: ${symbol}"
                echo "================================================================================"
                DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
                  --macho \
                  --arch=arm64 \
                  --demangle \
                  --disassemble-symbols="${symbol}" \
                  "$bin_abs" 2>&1
              } >> "$objdump_file"
            done < <(
              awk '/\(__TEXT,__text\)/ && /external|non-external/ {print $NF}' "$nm_file" \
                | grep -E 'generate_keypair|rej_sample|sample_matrix|serialize_public_key|serialize_secret_key' \
                | sort -u
            )

            grep -E '\bb[[:space:]]+0xff[0-9a-f]+' "$objdump_file" > "$branch_file" 2>&1 || true
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
              --macho \
              --arch=arm64 \
              --demangle \
              --disassemble \
              "$bin_abs" 2>&1 \
              | grep -E -B12 -A12 '\bb[[:space:]]+0xff[0-9a-f]+' \
              > "$full_branch_context" || true
            emit_context_hits "$objdump_file" "$hits_file"

            {
              echo "### ${mode} focused raw-byte hits"
              echo
              echo "\`\`\`text"
              cat "$hits_file"
              echo "\`\`\`"
              echo
              echo "### ${mode} direct low branch hits"
              echo
              echo "\`\`\`text"
              cat "$branch_file"
              echo "\`\`\`"
              echo
              echo "### ${mode} full disassembly low-branch context"
              echo
              echo "\`\`\`text"
              cat "$full_branch_context"
              echo "\`\`\`"
              echo
            } >> "$summary"

            lldb --batch \
              -o "target create ${bin_abs}" \
              -o "image lookup -rn generate_keypair" \
              -o "image lookup -rn rej_sample" \
              -o "image lookup -a 0x100012fac" \
              -o "image lookup -a 0x100016c20" \
              -o "image lookup -a 0x10002ff30" \
              -o "image lookup -a 0x10002f8dc" \
              -- > "$out_dir/${mode}.lldb-symbols.log" 2>&1
          }

          run_lldb_probe() {
            local bin_abs="$1"
            local mode="$2"
            local log="$out_dir/${mode}.lldb-run.log"
            pushd libcrux-ml-kem >/dev/null
            run_with_timeout 120 "$log" lldb --batch \
              -o "settings set -- target.run-args ${{ matrix.test_filter }} --exact --nocapture --test-threads=1" \
              -o "run" \
              -k "thread backtrace all" \
              -k "register read pc sp x8 x9 x25 x30" \
              -k "disassemble --pc --count 20" \
              -k 'image lookup -a $pc' \
              -- "$bin_abs"
            local status=$?
            popd >/dev/null
            echo "$status"
          }

          build_mode() {
            local mode="$1"
            local build_log="$out_dir/${mode}.build-no-run.log"
            local bin bin_abs build_status lldb_status

            {
              echo
              echo "## Mode: ${mode}"
              echo
            } >> "$summary"

            pushd libcrux-ml-kem >/dev/null
            cargo +1.78.0 clean >> "$summary" 2>&1
            if [ "$mode" = "ordinary" ]; then
              DEVELOPER_DIR="${developer_dir}" \
                cargo +1.78.0 test --verbose --release --no-run \
                > "$build_log" 2>&1
              build_status=$?
            else
              DEVELOPER_DIR="${developer_dir}" \
                RUSTFLAGS="-C target_feature=+neon" \
                cargo +1.78.0 test --verbose --release --no-run \
                > "$build_log" 2>&1
              build_status=$?
            fi
            popd >/dev/null

            {
              echo "- build exit: \`${build_status}\`"
              echo "- build log: \`${build_log}\`"
            } >> "$summary"

            if [ "$build_status" -ne 0 ]; then
              failure=1
              return
            fi

            bin="$(find_test_binary "${{ matrix.bin_glob }}")"
            if [ -z "$bin" ]; then
              echo "- selected binary: not found" >> "$summary"
              failure=1
              return
            fi

            bin_abs="$(cd "$(dirname "$bin")" && pwd)/$(basename "$bin")"
            echo "- selected binary: \`${bin_abs}\`" >> "$summary"

            collect_binary_blocks "$bin_abs" "$mode"
            lldb_status="$(run_lldb_probe "$bin_abs" "$mode")"

            {
              echo "- lldb run exit: \`${lldb_status}\`"
              echo "- lldb log: \`$out_dir/${mode}.lldb-run.log\`"
              echo
            } >> "$summary"
          }

          build_mode ordinary
          build_mode plus-neon

          cat "$summary"
          exit "$failure"

      - name: Upload raw block diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-raw-blocks-${{ matrix.commit_short }}-${{ matrix.xcode_label }}
          path: neon-rej-diagnostics/raw-blocks-${{ matrix.commit_short }}-${{ matrix.xcode_label }}
