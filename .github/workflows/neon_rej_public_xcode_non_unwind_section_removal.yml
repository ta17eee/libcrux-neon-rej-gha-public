name: NEON rejection sampler public Xcode non-unwind section removal

"on":
  workflow_dispatch:

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  non-unwind-section-removal:
    name: ${{ matrix.probe.label }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        probe:
          - label: 0c67 ordinary
            artifact_suffix: 0c67-ordinary
            ref: 0c67a85b028f74bac401f6adf14581b2e05104e1
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --test nistkats --no-run
            preferred_object_glob: nistkats-*
            target_hash: h8997d6f42564fb09
            target_offset_hex: "0x2d3c"
            target_feature_flags: ""
            expected_bytes: "fc 03 03 aa"
            corrupt_bytes: "fc 0f 01 aa"
          - label: 0c67 plus-neon
            artifact_suffix: 0c67-plus-neon
            ref: 0c67a85b028f74bac401f6adf14581b2e05104e1
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --test nistkats --no-run
            preferred_object_glob: nistkats-*
            target_hash: h8997d6f42564fb09
            target_offset_hex: "0x2d3c"
            target_feature_flags: "-C target_feature=+neon"
            expected_bytes: "fc 03 03 aa"
            corrupt_bytes: "fc 7f 00 aa"
          - label: b9fa ordinary
            artifact_suffix: b9fa-ordinary
            ref: b9fa21c6d53dc2b7de2e50d1694af284cb55f769
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --no-run
            preferred_object_glob: libcrux_ml_kem-*
            target_hash: hda4635a55fb002f6
            target_offset_hex: "0x1514"
            target_feature_flags: ""
            expected_bytes: "85 fc ff 17"
            corrupt_bytes: "85 f0 c2 17"
          - label: b9fa plus-neon
            artifact_suffix: b9fa-plus-neon
            ref: b9fa21c6d53dc2b7de2e50d1694af284cb55f769
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --no-run
            preferred_object_glob: libcrux_ml_kem-*
            target_hash: hda4635a55fb002f6
            target_offset_hex: "0x1514"
            target_feature_flags: "-C target_feature=+neon"
            expected_bytes: "85 fc ff 17"
            corrupt_bytes: "85 c0 c2 17"

    steps:
      - name: Checkout public upstream libcrux
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: ${{ matrix.probe.ref }}

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        id: patch_deps
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Install historical toolchain
        id: install_toolchain
        run: |
          rustup toolchain install 1.78.0
          rustup component add llvm-tools-preview --toolchain 1.78.0

      - name: Remove non-unwind sections and direct-link
        if: ${{ always() && steps.patch_deps.outcome == 'success' && steps.install_toolchain.outcome == 'success' }}
        run: |
          set +e
          developer_dir="/Applications/Xcode_15.0.1.app/Contents/Developer"
          label="${{ matrix.probe.label }}"
          commit="${{ matrix.probe.ref }}"
          cargo_args="${{ matrix.probe.cargo_args }}"
          preferred_object_glob="${{ matrix.probe.preferred_object_glob }}"
          target_hash="${{ matrix.probe.target_hash }}"
          target_offset_hex="${{ matrix.probe.target_offset_hex }}"
          target_feature_flags="${{ matrix.probe.target_feature_flags }}"
          expected_bytes="${{ matrix.probe.expected_bytes }}"
          corrupt_bytes="${{ matrix.probe.corrupt_bytes }}"
          target_root="$PWD/target/release"
          out_dir="$PWD/neon-rej-diagnostics/non-unwind-section-removal-${{ matrix.probe.artifact_suffix }}"
          mkdir -p "$out_dir"
          summary="$out_dir/summary.md"
          rows="$out_dir/summary.rows.tsv"

          {
            echo "# Non-unwind section removal direct ld probe"
            echo
            echo "Label: \`${label}\`"
            echo "Commit: \`${commit}\`"
            echo "Developer dir: \`${developer_dir}\`"
            echo "Target feature flags: \`${target_feature_flags}\`"
            echo "Target: \`generate_keypair17${target_hash} + ${target_offset_hex}\`"
            echo "Expected target bytes: \`${expected_bytes}\`"
            echo "Known corrupt bytes for Xcode 15.0.1 new ld: \`${corrupt_bytes}\`"
            echo
            echo "## Runner and toolchain"
            echo
            echo "\`\`\`text"
            sw_vers
            uname -a
            sysctl hw.optional.AdvSIMD || true
            DEVELOPER_DIR="${developer_dir}" xcodebuild -version || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find ld || true
            DEVELOPER_DIR="${developer_dir}" xcrun --show-sdk-path || true
            DEVELOPER_DIR="${developer_dir}" ld -v || true
            DEVELOPER_DIR="${developer_dir}" ld -version_details || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
            rust_sysroot="$(rustc +1.78.0 --print sysroot)"
            rust_host="$(rustc +1.78.0 -vV | awk '/^host:/ { print $2 }')"
            "${rust_sysroot}/lib/rustlib/${rust_host}/bin/llvm-objcopy" --version || true
            echo "\`\`\`"
            echo
          } > "$summary" 2>&1

          printf 'case\tobject_variant\tremoved_sections\ttransform_status\tlink_variant\tlink_status\tobject_line\tfinal_line\tobject_size\tvariant_size\tobject_expected_count\tvariant_expected_count\tfinal_expected_count\tfinal_corrupt_count\tsection_presence\n' > "$rows"

          add_hex() {
            python3 - "$1" "$2" <<'PY'
          import sys
          print(f"{int(sys.argv[1], 16) + int(sys.argv[2], 16):x}")
          PY
          }

          count_bytes() {
            local path="$1"
            local pattern="$2"
            python3 - "$path" "$pattern" <<'PY'
          import sys
          path, pattern = sys.argv[1:]
          try:
              data = open(path, "rb").read()
          except OSError:
              print("NA")
              raise SystemExit(0)
          needle = bytes(int(x, 16) for x in pattern.split())
          count = 0
          start = 0
          while True:
              idx = data.find(needle, start)
              if idx < 0:
                  break
              count += 1
              start = idx + 1
          print(count)
          PY
          }

          file_size() {
            python3 - "$1" <<'PY'
          import os, sys
          try:
              print(os.path.getsize(sys.argv[1]))
          except OSError:
              print("NA")
          PY
          }

          find_target_object() {
            local obj nm_file first_match=""
            : > "$out_dir/object-candidates.txt"
            while IFS= read -r obj; do
              nm_file="$out_dir/$(basename "$obj").nm.txt"
              nm -nm "$obj" > "$nm_file" 2>&1
              if grep -q "$target_hash" "$nm_file"; then
                printf '%s\n' "$obj" >> "$out_dir/object-candidates.txt"
                [ -z "$first_match" ] && first_match="$obj"
                case "$(basename "$obj")" in
                  ${preferred_object_glob}) printf '%s\n' "$obj"; return 0 ;;
                esac
              fi
            done < <(find "$target_root" -type f -name '*.o' -print | sort)
            [ -n "$first_match" ] && printf '%s\n' "$first_match"
          }

          target_line() {
            local path="$1"
            local out_file="$2"
            local nm_file="$out_file.nm.txt"
            local symbol_addr target_addr dis_file
            nm -nm "$path" > "$nm_file" 2>&1
            symbol_addr="$(awk -v h="$target_hash" '$0 ~ h { print $1; exit }' "$nm_file")"
            if ! printf '%s' "$symbol_addr" | grep -Eq '^[0-9a-fA-F]+$'; then
              echo "missing" > "$out_file"
              return 0
            fi
            target_addr="$(add_hex "0x${symbol_addr}" "$target_offset_hex")"
            dis_file="$(mktemp "${RUNNER_TEMP:-/tmp}/target-line.XXXXXX")"
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
              --macho --arch=arm64 --demangle --disassemble \
              "$path" > "$dis_file" 2>&1
            python3 - "$dis_file" "$target_addr" "$out_file" <<'PY'
          import re, sys
          path, target_s, out = sys.argv[1:]
          target = int(target_s, 16)
          found = "missing"
          window = []
          lines = open(path, errors="replace").read().splitlines()
          for i, line in enumerate(lines):
              m = re.match(r"\s*([0-9a-fA-F]+):\s*(.*)", line)
              if m and int(m.group(1), 16) == target:
                  found = line.strip()
                  window = lines[max(0, i - 10):min(len(lines), i + 11)]
                  break
          open(out, "w").write(found + "\n")
          open(out + ".window", "w").write("\n".join(window) + ("\n" if window else ""))
          PY
            rm -f "$dis_file"
          }

          section_presence() {
            local path="$1"
            local lc_file="$2"
            otool -l "$path" > "$lc_file" 2>&1 || true
            python3 - "$lc_file" <<'PY'
          import sys
          wanted = [
              "__TEXT,__gcc_except_tab",
              "__TEXT,__literal4",
              "__TEXT,__literal8",
              "__TEXT,__literal16",
              "__TEXT,__const",
              "__DATA,__const",
              "__DATA,__thread_vars",
              "__DATA,__thread_data",
              "__DATA,__thread_bss",
          ]
          found = set()
          cur = {}
          for line in open(sys.argv[1], errors="replace"):
              parts = line.strip().split()
              if len(parts) >= 2 and parts[0] == "sectname":
                  cur = {"sect": parts[1]}
              elif len(parts) >= 2 and parts[0] == "segname" and cur:
                  cur["seg"] = parts[1]
              elif len(parts) >= 2 and parts[0] == "flags" and cur:
                  if "seg" in cur:
                      found.add(f"{cur['seg']},{cur['sect']}")
                  cur = {}
          print(",".join(f"{name}={'yes' if name in found else 'no'}" for name in wanted))
          PY
          }

          transform_object() {
            local variant="$1"
            shift
            local dir="$out_dir/objects/${variant}"
            local output="$dir/selected-object.o"
            mkdir -p "$dir"
            local args=()
            local section
            for section in "$@"; do
              args+=(--remove-section="$section")
            done
            if [ "${#args[@]}" -eq 0 ]; then
              cp "$selected_obj" "$output" > "$dir/transform.log" 2>&1
            else
              "$objcopy_tool" "${args[@]}" "$selected_obj" "$output" > "$dir/transform.log" 2>&1
            fi
            printf '%s\n' "$?"
          }

          zero_object_sections() {
            local variant="$1"
            shift
            local dir="$out_dir/objects/${variant}"
            local output="$dir/selected-object.o"
            mkdir -p "$dir"
            python3 - "$selected_obj" "$output" "$@" > "$dir/transform.log" 2>&1 <<'PY'
          import struct
          import sys

          src, dst, *targets = sys.argv[1:]
          targets = set(targets)
          data = bytearray(open(src, "rb").read())

          def cstr(raw):
              return raw.split(b"\0", 1)[0].decode("ascii", "replace")

          if len(data) < 32:
              print("file too small for mach_header_64")
              raise SystemExit(2)
          magic, = struct.unpack_from("<I", data, 0)
          if magic != 0xfeedfacf:
              print(f"unexpected Mach-O magic 0x{magic:08x}")
              raise SystemExit(2)
          ncmds, = struct.unpack_from("<I", data, 16)
          off = 32
          found = {}
          for _ in range(ncmds):
              if off + 8 > len(data):
                  print("truncated load command")
                  raise SystemExit(2)
              cmd, cmdsize = struct.unpack_from("<II", data, off)
              if cmd == 0x19:  # LC_SEGMENT_64
                  nsects, = struct.unpack_from("<I", data, off + 64)
                  sec_off = off + 72
                  for _ in range(nsects):
                      sect = cstr(data[sec_off:sec_off + 16])
                      seg = cstr(data[sec_off + 16:sec_off + 32])
                      size, = struct.unpack_from("<Q", data, sec_off + 40)
                      file_offset, = struct.unpack_from("<I", data, sec_off + 48)
                      name = f"{seg},{sect}"
                      if name in targets:
                          end = file_offset + size
                          if end > len(data):
                              print(f"{name}: section data out of range offset={file_offset} size={size}")
                              raise SystemExit(2)
                          data[file_offset:end] = b"\0" * size
                          found[name] = (file_offset, size)
                      sec_off += 80
              off += cmdsize
          missing = sorted(targets - set(found))
          if missing:
              print("missing sections: " + " ".join(missing))
              raise SystemExit(44)
          with open(dst, "wb") as f:
              f.write(data)
          for name, (file_offset, size) in sorted(found.items()):
              print(f"zeroed {name} offset={file_offset} size={size}")
          PY
            printf '%s\n' "$?"
          }

          zero_object_symbols() {
            local variant="$1"
            local zero_size="$2"
            shift 2
            local dir="$out_dir/objects/${variant}"
            local output="$dir/selected-object.o"
            mkdir -p "$dir"
            xcrun llvm-nm -nm "$selected_obj" > "$dir/source.nm.txt" 2> "$dir/source.nm.err" || true
            python3 - "$selected_obj" "$output" "$dir/source.nm.txt" "$zero_size" "$@" > "$dir/transform.log" 2>&1 <<'PY'
          import re
          import struct
          import sys

          src, dst, nm_path, zero_size, *targets = sys.argv[1:]
          zero_size = int(zero_size, 0)
          targets = set(targets)
          data = bytearray(open(src, "rb").read())

          def cstr(raw):
              return raw.split(b"\0", 1)[0].decode("ascii", "replace")

          if len(data) < 32:
              print("file too small for mach_header_64")
              raise SystemExit(2)
          magic, = struct.unpack_from("<I", data, 0)
          if magic != 0xfeedfacf:
              print(f"unexpected Mach-O magic 0x{magic:08x}")
              raise SystemExit(2)

          sections = []
          ncmds, = struct.unpack_from("<I", data, 16)
          off = 32
          for _ in range(ncmds):
              if off + 8 > len(data):
                  print("truncated load command")
                  raise SystemExit(2)
              cmd, cmdsize = struct.unpack_from("<II", data, off)
              if cmd == 0x19:  # LC_SEGMENT_64
                  nsects, = struct.unpack_from("<I", data, off + 64)
                  sec_off = off + 72
                  for _ in range(nsects):
                      sect = cstr(data[sec_off:sec_off + 16])
                      seg = cstr(data[sec_off + 16:sec_off + 32])
                      addr, size = struct.unpack_from("<QQ", data, sec_off + 32)
                      file_offset, = struct.unpack_from("<I", data, sec_off + 48)
                      sections.append((seg, sect, addr, size, file_offset))
                      sec_off += 80
              off += cmdsize

          nm_re = re.compile(r"^([0-9a-fA-F]+) \(([^,]+),([^)]+)\) .* ([^ ]+)$")
          symbols = {}
          for line in open(nm_path, errors="replace"):
              match = nm_re.match(line.strip())
              if not match:
                  continue
              value = int(match.group(1), 16)
              name = match.group(4)
              if name in targets:
                  symbols[name] = (value, match.group(2), match.group(3))

          missing = sorted(targets - set(symbols))
          if missing:
              print("missing symbols: " + " ".join(missing))
              raise SystemExit(44)

          for name, (value, sym_seg, sym_sect) in sorted(symbols.items()):
              candidates = [
                  s for s in sections
                  if s[0] == sym_seg and s[1] == sym_sect and s[2] <= value < s[2] + s[3]
              ]
              if not candidates:
                  print(f"{name}: no containing section for value=0x{value:x} {sym_seg},{sym_sect}")
                  raise SystemExit(2)
              seg, sect, addr, size, file_offset = candidates[0]
              rel = value - addr
              start = file_offset + rel
              end = start + zero_size
              if rel + zero_size > size or end > len(data):
                  print(f"{name}: zero range out of section/file value=0x{value:x} rel={rel} size={zero_size}")
                  raise SystemExit(2)
              data[start:end] = b"\0" * zero_size
              print(f"zeroed {name} {seg},{sect} value=0x{value:x} file_offset={start} size={zero_size}")

          with open(dst, "wb") as f:
              f.write(data)
          PY
            printf '%s\n' "$?"
          }

          link_with_ld() {
            local object_variant="$1"
            local object_path="$2"
            local link_variant="$3"
            local use_classic="$4"
            local link_dir="$out_dir/${object_variant}/${link_variant}"
            local bin="$link_dir/test.${object_variant}.${link_variant}"
            local map="$link_dir/test.${object_variant}.${link_variant}.map"
            mkdir -p "$link_dir"
            local args=(
              -demangle
              -dynamic
              -arch arm64
              -platform_version macos 14.0.0 14.0
              -syslibroot "$sdkroot"
              -o "$bin"
              -L "$target_root/deps"
              -L "$rustlib"
              -L /usr/local/lib
              "$object_path"
              "$compiler_builtins"
              -liconv
              -lSystem
              -lc
              -lm
              -dead_strip
              -map "$map"
            )
            if [ "$use_classic" = "yes" ]; then
              args+=(-ld_classic)
            fi
            {
              printf 'DEVELOPER_DIR=%q xcrun ld' "$developer_dir"
              printf ' %q' "${args[@]}"
              echo
            } > "$link_dir/ld-command.txt"
            DEVELOPER_DIR="${developer_dir}" xcrun ld "${args[@]}" > "$link_dir/link.log" 2>&1
            printf '%s\n' "$?" > "$link_dir/status.txt"
            echo "$bin"
          }

          record_variant() {
            local object_variant="$1"
            local removed_sections="$2"
            local transform_status="$3"
            local object_path="$4"
            local link_variant="$5"
            local bin="$6"
            local link_status="$7"
            local meta_dir="$out_dir/objects/${object_variant}"
            local link_dir="$out_dir/${object_variant}/${link_variant}"
            local object_line final_line object_size variant_size object_expected variant_expected final_expected final_corrupt presence
            object_line="$(cat "$meta_dir/object.target-line.txt" 2>/dev/null || echo missing)"
            final_line="missing"
            object_size="$(file_size "$selected_obj")"
            variant_size="$(file_size "$object_path")"
            object_expected="$(count_bytes "$selected_obj" "$expected_bytes")"
            variant_expected="$(count_bytes "$object_path" "$expected_bytes")"
            final_expected="NA"
            final_corrupt="NA"
            presence="$(section_presence "$object_path" "$meta_dir/otool-load-commands.txt")"
            if [ "$link_status" -eq 0 ]; then
              target_line "$bin" "$link_dir/final.target-line.txt"
              final_line="$(cat "$link_dir/final.target-line.txt")"
              final_expected="$(count_bytes "$bin" "$expected_bytes")"
              final_corrupt="$(count_bytes "$bin" "$corrupt_bytes")"
            fi
            {
              echo "## ${object_variant} / ${link_variant}"
              echo
              echo "- removed_sections: \`${removed_sections:-none}\`"
              echo "- transform_status: \`${transform_status}\`"
              echo "- link_status: \`${link_status}\`"
              echo "- object target: \`${object_line}\`"
              echo "- final target: \`${final_line}\`"
              echo "- object_size: \`${object_size}\`"
              echo "- variant_size: \`${variant_size}\`"
              echo "- section_presence: \`${presence}\`"
              echo "- object expected byte count: \`${object_expected}\`"
              echo "- variant expected byte count: \`${variant_expected}\`"
              echo "- final expected byte count: \`${final_expected}\`"
              echo "- final corrupt byte count: \`${final_corrupt}\`"
              echo
              echo "### object target window"
              echo
              echo "\`\`\`text"
              cat "$meta_dir/object.target-line.txt.window" 2>/dev/null || true
              echo "\`\`\`"
              echo
              echo "### final target window"
              echo
              echo "\`\`\`text"
              cat "$link_dir/final.target-line.txt.window" 2>/dev/null || true
              echo "\`\`\`"
              echo
              echo "### transform log"
              echo
              echo "\`\`\`text"
              cat "$meta_dir/transform.log" 2>/dev/null || true
              echo "\`\`\`"
              echo
              echo "### link log"
              echo
              echo "\`\`\`text"
              cat "$link_dir/link.log" 2>/dev/null || true
              echo "\`\`\`"
              echo
            } >> "$summary"
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$label" "$object_variant" "${removed_sections:-none}" "$transform_status" "$link_variant" "$link_status" \
              "${object_line//$'\t'/ }" "${final_line//$'\t'/ }" "$object_size" "$variant_size" \
              "$object_expected" "$variant_expected" "$final_expected" "$final_corrupt" "$presence" >> "$rows"
          }

          make_and_link_variant() {
            local object_variant="$1"
            local removed_sections="$2"
            local transform_status="$3"
            local object_path="$out_dir/objects/${object_variant}/selected-object.o"
            if [ "$transform_status" -ne 0 ] || [ ! -f "$object_path" ]; then
              {
                echo "## ${object_variant}"
                echo
                echo "- removed_sections: \`${removed_sections:-none}\`"
                echo "- transform_status: \`${transform_status}\`"
                echo
                echo "\`\`\`text"
                cat "$out_dir/objects/${object_variant}/transform.log" 2>/dev/null || true
                echo "\`\`\`"
                echo
              } >> "$summary"
              printf '%s\t%s\t%s\t%s\tNA\tNA\tmissing\tmissing\tNA\tNA\tNA\tNA\tNA\tNA\tNA\n' \
                "$label" "$object_variant" "${removed_sections:-none}" "$transform_status" >> "$rows"
              return 0
            fi
            target_line "$object_path" "$out_dir/objects/${object_variant}/object.target-line.txt"
            for link_variant in ld_new_no_lto ld_classic_no_lto; do
              if [ "$link_variant" = "ld_classic_no_lto" ]; then
                bin="$(link_with_ld "$object_variant" "$object_path" "$link_variant" yes)"
              else
                bin="$(link_with_ld "$object_variant" "$object_path" "$link_variant" no)"
              fi
              link_status="$(cat "$out_dir/${object_variant}/${link_variant}/status.txt")"
              record_variant "$object_variant" "$removed_sections" "$transform_status" "$object_path" "$link_variant" "$bin" "$link_status"
            done
          }

          if [ ! -d "${developer_dir}" ]; then
            printf '%s\tmissing_xcode\tNA\tNA\tNA\tNA\tmissing\tmissing\tNA\tNA\tNA\tNA\tNA\tNA\tNA\n' "$label" >> "$rows"
            cat "$summary"
            exit 0
          fi

          rustlib="$(rustc +1.78.0 --print target-libdir)"
          compiler_builtins="$(ls "$rustlib"/libcompiler_builtins-*.rlib | head -n 1)"
          sdkroot="$(DEVELOPER_DIR="${developer_dir}" xcrun --show-sdk-path)"
          rust_host="$(rustc +1.78.0 -vV | awk '/^host:/ { print $2 }')"
          objcopy_tool="$(rustc +1.78.0 --print sysroot)/lib/rustlib/${rust_host}/bin/llvm-objcopy"
          build_rustflags="-C save-temps ${target_feature_flags}"

          DEVELOPER_DIR="${developer_dir}" RUSTFLAGS="${build_rustflags}" \
            cargo +1.78.0 test ${cargo_args} \
            > "$out_dir/build.log" 2>&1
          build_status=$?
          selected_obj="$(find_target_object || true)"

          {
            echo "## Build"
            echo
            echo "- RUSTFLAGS: \`${build_rustflags}\`"
            echo "- cargo args: \`${cargo_args}\`"
            echo "- build_status: \`${build_status}\`"
            echo "- selected_obj: \`${selected_obj:-missing}\`"
            echo "- compiler_builtins: \`${compiler_builtins:-missing}\`"
            echo "- sdkroot: \`${sdkroot:-missing}\`"
            echo "- objcopy_tool: \`${objcopy_tool:-missing}\`"
            echo
            echo "## Build log tail"
            echo
            echo "\`\`\`text"
            tail -n 120 "$out_dir/build.log" || true
            echo "\`\`\`"
            echo
          } >> "$summary"

          if [ "$build_status" -ne 0 ] || [ -z "$selected_obj" ] || [ -z "$compiler_builtins" ] || [ ! -x "$objcopy_tool" ]; then
            printf '%s\tbuild_or_lookup_failed\tNA\tNA\tNA\tNA\tmissing\tmissing\tNA\tNA\tNA\tNA\tNA\tNA\tNA\n' "$label" >> "$rows"
            cat "$summary"
            exit 0
          fi

          status="$(transform_object original)"
          make_and_link_variant original none "$status"

          status="$(zero_object_sections zero_gcc_except_tab "__TEXT,__gcc_except_tab")"
          make_and_link_variant zero_gcc_except_tab "zero:__TEXT,__gcc_except_tab" "$status"

          status="$(zero_object_sections zero_literal4 "__TEXT,__literal4")"
          make_and_link_variant zero_literal4 "zero:__TEXT,__literal4" "$status"

          status="$(zero_object_sections zero_literal8 "__TEXT,__literal8")"
          make_and_link_variant zero_literal8 "zero:__TEXT,__literal8" "$status"

          status="$(zero_object_sections zero_literal16 "__TEXT,__literal16")"
          make_and_link_variant zero_literal16 "zero:__TEXT,__literal16" "$status"

          status="$(zero_object_sections zero_all_literals "__TEXT,__literal4" "__TEXT,__literal8" "__TEXT,__literal16")"
          make_and_link_variant zero_all_literals "zero:__TEXT,__literal4 __TEXT,__literal8 __TEXT,__literal16" "$status"

          case "$label" in
            "0c67 ordinary")
              near_literal_a="lCPI203_1"
              near_literal_b="lCPI203_2"
              ;;
            "0c67 plus-neon")
              near_literal_a="lCPI210_1"
              near_literal_b="lCPI210_2"
              ;;
            "b9fa ordinary"|"b9fa plus-neon")
              near_literal_a="lCPI4_0"
              near_literal_b=""
              ;;
            *)
              near_literal_a=""
              near_literal_b=""
              ;;
          esac

          if [ -n "$near_literal_a" ]; then
            status="$(zero_object_symbols zero_near_literal_a 16 "$near_literal_a")"
            make_and_link_variant zero_near_literal_a "zero-symbol:${near_literal_a}:16" "$status"
          fi

          if [ -n "$near_literal_b" ]; then
            status="$(zero_object_symbols zero_near_literal_b 16 "$near_literal_b")"
            make_and_link_variant zero_near_literal_b "zero-symbol:${near_literal_b}:16" "$status"

            status="$(zero_object_symbols zero_near_literals_pair 16 "$near_literal_a" "$near_literal_b")"
            make_and_link_variant zero_near_literals_pair "zero-symbol:${near_literal_a},${near_literal_b}:16" "$status"
          fi

          status="$(zero_object_sections zero_text_const "__TEXT,__const")"
          make_and_link_variant zero_text_const "zero:__TEXT,__const" "$status"

          status="$(zero_object_sections zero_data_const "__DATA,__const")"
          make_and_link_variant zero_data_const "zero:__DATA,__const" "$status"

          status="$(zero_object_sections zero_text_data_const "__TEXT,__const" "__DATA,__const")"
          make_and_link_variant zero_text_data_const "zero:__TEXT,__const __DATA,__const" "$status"

          status="$(zero_object_sections zero_thread_vars "__DATA,__thread_vars")"
          make_and_link_variant zero_thread_vars "zero:__DATA,__thread_vars" "$status"

          status="$(transform_object remove_gcc_except_tab "__TEXT,__gcc_except_tab")"
          make_and_link_variant remove_gcc_except_tab "__TEXT,__gcc_except_tab" "$status"

          status="$(transform_object remove_literal4 "__TEXT,__literal4")"
          make_and_link_variant remove_literal4 "__TEXT,__literal4" "$status"

          status="$(transform_object remove_literal8 "__TEXT,__literal8")"
          make_and_link_variant remove_literal8 "__TEXT,__literal8" "$status"

          status="$(transform_object remove_literal16 "__TEXT,__literal16")"
          make_and_link_variant remove_literal16 "__TEXT,__literal16" "$status"

          status="$(transform_object remove_all_literals "__TEXT,__literal4" "__TEXT,__literal8" "__TEXT,__literal16")"
          make_and_link_variant remove_all_literals "__TEXT,__literal4 __TEXT,__literal8 __TEXT,__literal16" "$status"

          status="$(transform_object remove_text_const "__TEXT,__const")"
          make_and_link_variant remove_text_const "__TEXT,__const" "$status"

          status="$(transform_object remove_data_const "__DATA,__const")"
          make_and_link_variant remove_data_const "__DATA,__const" "$status"

          status="$(transform_object remove_text_data_const "__TEXT,__const" "__DATA,__const")"
          make_and_link_variant remove_text_data_const "__TEXT,__const __DATA,__const" "$status"

          status="$(transform_object remove_thread_vars "__DATA,__thread_vars")"
          make_and_link_variant remove_thread_vars "__DATA,__thread_vars" "$status"

          cat "$summary"
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-non-unwind-section-removal-${{ matrix.probe.artifact_suffix }}
          path: neon-rej-diagnostics/**
