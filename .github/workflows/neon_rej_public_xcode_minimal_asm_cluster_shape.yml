name: NEON rejection sampler public Xcode minimal asm cluster shape

"on":
  workflow_dispatch:

jobs:
  minimal-asm-cluster-shape:
    name: minimal asm cluster shape
    runs-on: macos-14

    steps:
      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Build and link minimal cluster assembly shapes
        run: |
          set +e
          developer_dir="/Applications/Xcode_15.0.1.app/Contents/Developer"
          out_dir="$PWD/neon-rej-diagnostics/minimal-asm-cluster-shape"
          mkdir -p "$out_dir"
          summary="$out_dir/summary.md"
          rows="$out_dir/summary.rows.tsv"

          {
            echo "# Minimal assembly cluster-shape probe"
            echo
            echo "Developer dir: \`${developer_dir}\`"
            echo
            echo "## Runner and toolchain"
            echo
            echo "\`\`\`text"
            sw_vers
            uname -a
            sysctl hw.optional.AdvSIMD || true
            DEVELOPER_DIR="${developer_dir}" xcodebuild -version || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find clang || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find ld || true
            DEVELOPER_DIR="${developer_dir}" xcrun --show-sdk-path || true
            DEVELOPER_DIR="${developer_dir}" ld -v || true
            DEVELOPER_DIR="${developer_dir}" ld -version_details || true
            echo "\`\`\`"
            echo
          } > "$summary" 2>&1

          printf 'case\tvariant\tlink_status\trun_status\tobject_line\tfinal_line\tobject_expected_count\tfinal_expected_count\tfinal_corrupt_ordinary_count\tfinal_corrupt_plus_neon_count\n' > "$rows"

          if [ ! -d "${developer_dir}" ]; then
            printf 'all\tmissing_xcode\tNA\tNA\tmissing\tmissing\tNA\tNA\tNA\tNA\n' >> "$rows"
            cat "$summary"
            exit 0
          fi

          sdkroot="$(DEVELOPER_DIR="${developer_dir}" xcrun --show-sdk-path)"
          caller_asm="$out_dir/minimal_cluster_caller.s"
          callee_asm="$out_dir/minimal_cluster_callee.s"
          obj="$out_dir/minimal_cluster_caller.o"
          callee_obj="$out_dir/minimal_cluster_callee.o"

          cat > "$caller_asm" <<'ASM'
          .text
          .p2align 2
          .globl _main
          .private_extern _main
          _main:
          mov w0, #0
          ret

          .p2align 2
          .globl _case_b9fa_cluster
          _case_b9fa_cluster:
          .rept 859
          nop
          .endr
          bl _SIMD128Vector_rej_sample
          mov w30, #3329
          mvni.4s v6, #3, msl #16
          adrp x7, L_b9fa_const@PAGE
          movi.2d v16, #0
          add x11, sp, #1, lsl #12
          add x11, x11, #1760
          add x25, x0, x25
          bl _SIMD128Vector_rej_sample
          mov w30, #3329
          mvni.4s v6, #3, msl #16
          adrp x7, L_b9fa_const@PAGE
          movi.2d v16, #0
          add x11, sp, #1, lsl #12
          add x11, x11, #1760
          add x25, x0, x25
          bl _SIMD128Vector_rej_sample
          mov w30, #3329
          mvni.4s v6, #3, msl #16
          adrp x7, L_b9fa_const@PAGE
          movi.2d v16, #0
          add x11, sp, #1, lsl #12
          add x11, x11, #1760
          add x25, x0, x25
          bl _SIMD128Vector_rej_sample
          mov w30, #3329
          mvni.4s v6, #3, msl #16
          adrp x7, L_b9fa_const@PAGE
          movi.2d v16, #0
          add x11, sp, #1, lsl #12
          add x11, x11, #1760
          add x25, x0, x25
          b _case_b9fa_cluster
          ret

          .p2align 2
          .globl _case_0c67_cluster
          _case_0c67_cluster:
          .rept 936
          nop
          .endr
          bl _SIMD128Vector_rej_sample
          ldr q11, [sp, #1872]
          ldr q17, [sp, #2304]
          ldr q20, [sp, #2352]
          ldr x3, [sp, #2592]
          mvni.4s v6, #3, msl #16
          mov w30, #256
          adrp x7, L_0c67_const2@PAGE
          mov w6, #3329
          adrp x5, L_0c67_const1@PAGE
          movi.2d v31, #0
          add x1, sp, #3, lsl #12
          add x1, x1, #688
          add x17, sp, #4, lsl #12
          add x17, x17, #3776
          add x16, sp, #7, lsl #12
          add x16, x16, #3936
          add x19, x0, x19
          b _case_0c67_cluster
          mov x28, x3
          ret

          .section __TEXT,__const
          .p2align 4
          L_b9fa_const:
          .quad 0x1122334455667788
          L_0c67_const1:
          .quad 0x99aabbccddeeff00
          L_0c67_const2:
          .quad 0x0123456789abcdef
          ASM

          cat > "$callee_asm" <<'ASM'
          .text
          .p2align 2
          .globl _SIMD128Vector_rej_sample
          _SIMD128Vector_rej_sample:
          ret
          ASM

          add_hex() {
            python3 - "$1" "$2" <<'PY'
          import sys
          print(f"{int(sys.argv[1], 16) + int(sys.argv[2], 16):x}")
          PY
          }

          count_bytes() {
            local path="$1"
            local pattern="$2"
            python3 - "$path" "$pattern" <<'PY'
          import sys
          path, pattern = sys.argv[1:]
          try:
              data = open(path, "rb").read()
          except OSError:
              print("NA")
              raise SystemExit(0)
          needle = bytes(int(x, 16) for x in pattern.split())
          count = 0
          start = 0
          while True:
              idx = data.find(needle, start)
              if idx < 0:
                  break
              count += 1
              start = idx + 1
          print(count)
          PY
          }

          target_line() {
            local path="$1"
            local symbol="$2"
            local offset="$3"
            local out_file="$4"
            local nm_file="$out_file.nm.txt"
            local dis_file="$out_file.window"
            local symbol_addr target_addr start_addr stop_addr
            nm -nm "$path" > "$nm_file" 2>&1
            symbol_addr="$(awk -v s="$symbol" '$0 ~ s { print $1; exit }' "$nm_file")"
            if ! printf '%s' "$symbol_addr" | grep -Eq '^[0-9a-fA-F]+$'; then
              echo "missing" > "$out_file"
              return 0
            fi
            target_addr="$(add_hex "0x${symbol_addr}" "$offset")"
            start_addr="$(python3 - "$target_addr" <<'PY'
          import sys
          print(hex(max(0, int(sys.argv[1], 16) - 0x60)))
          PY
          )"
            stop_addr="$(python3 - "$target_addr" <<'PY'
          import sys
          print(hex(int(sys.argv[1], 16) + 0x40))
          PY
          )"
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
              --macho --arch=arm64 --disassemble \
              --start-address="${start_addr}" --stop-address="${stop_addr}" \
              "$path" > "$dis_file" 2>&1
            python3 - "$dis_file" "$target_addr" "$out_file" <<'PY'
          import re, sys
          path, target_s, out = sys.argv[1:]
          target = int(target_s, 16)
          found = "missing"
          for line in open(path, errors="replace"):
              m = re.match(r"\s*([0-9a-fA-F]+):\s*(.*)", line)
              if m and int(m.group(1), 16) == target:
                  found = line.strip()
                  break
          open(out, "w").write(found + "\n")
          PY
          }

          run_with_timeout() {
            local seconds="$1"
            shift
            python3 - "$seconds" "$@" <<'PY'
          import os, signal, subprocess, sys, time
          seconds = int(sys.argv[1])
          argv = sys.argv[2:]
          proc = subprocess.Popen(argv, preexec_fn=os.setsid)
          deadline = time.time() + seconds
          while True:
              status = proc.poll()
              if status is not None:
                  raise SystemExit(status)
              if time.time() >= deadline:
                  os.killpg(proc.pid, signal.SIGTERM)
                  time.sleep(2)
                  if proc.poll() is None:
                      os.killpg(proc.pid, signal.SIGKILL)
                  raise SystemExit(124)
              time.sleep(0.2)
          PY
          }

          : > "$out_dir/assemble.log"
          DEVELOPER_DIR="${developer_dir}" xcrun clang -arch arm64 -c "$caller_asm" -o "$obj" >> "$out_dir/assemble.log" 2>&1
          caller_assemble_status=$?
          DEVELOPER_DIR="${developer_dir}" xcrun clang -arch arm64 -c "$callee_asm" -o "$callee_obj" >> "$out_dir/assemble.log" 2>&1
          callee_assemble_status=$?
          assemble_status=0
          if [ "$caller_assemble_status" -ne 0 ] || [ "$callee_assemble_status" -ne 0 ]; then
            assemble_status=1
          fi

          if [ "$assemble_status" -eq 0 ]; then
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump --macho --arch=arm64 --reloc "$obj" > "$out_dir/object.relocs.txt" 2>&1 || true
            target_line "$obj" "_case_b9fa_cluster" "0xdec" "$out_dir/object.b9fa.target-line.txt"
            target_line "$obj" "_case_0c67_cluster" "0xeec" "$out_dir/object.0c67.target-line.txt"
          fi

          {
            echo "## Assembly"
            echo
            echo "- assemble_status: \`${assemble_status}\`"
            echo "- caller_assemble_status: \`${caller_assemble_status}\`"
            echo "- callee_assemble_status: \`${callee_assemble_status}\`"
            echo "- b9fa object target: \`$(cat "$out_dir/object.b9fa.target-line.txt" 2>/dev/null || echo missing)\`"
            echo "- 0c67 object target: \`$(cat "$out_dir/object.0c67.target-line.txt" 2>/dev/null || echo missing)\`"
            echo
            echo "### Caller source"
            echo
            echo "\`\`\`asm"
            sed -n '1,220p' "$caller_asm"
            echo "\`\`\`"
            echo
            echo "### Object relocations"
            echo
            echo "\`\`\`text"
            cat "$out_dir/object.relocs.txt" 2>/dev/null || true
            echo "\`\`\`"
            echo
            echo "### Assemble log"
            echo
            echo "\`\`\`text"
            cat "$out_dir/assemble.log" 2>/dev/null || true
            echo "\`\`\`"
            echo
          } >> "$summary"

          if [ "$assemble_status" -ne 0 ]; then
            cat "$summary"
            exit 0
          fi

          link_with_ld() {
            local label="$1"
            local use_classic="$2"
            local link_dir="$out_dir/${label}"
            local bin="$link_dir/minimal_cluster.${label}"
            local map="$link_dir/minimal_cluster.${label}.map"
            mkdir -p "$link_dir"
            local args=(
              -demangle
              -dynamic
              -arch arm64
              -platform_version macos 14.0.0 14.0
              -syslibroot "$sdkroot"
              -o "$bin"
              "$obj"
              "$callee_obj"
              -lSystem
              -lc
              -u _case_b9fa_cluster
              -u _case_0c67_cluster
              -dead_strip
              -map "$map"
            )
            if [ "$use_classic" = "yes" ]; then
              args+=(-ld_classic)
            fi
            {
              printf 'DEVELOPER_DIR=%q xcrun ld' "$developer_dir"
              printf ' %q' "${args[@]}"
              echo
            } > "$link_dir/ld-command.txt"
            DEVELOPER_DIR="${developer_dir}" xcrun ld "${args[@]}" > "$link_dir/link.log" 2>&1
            printf '%s\n' "$?" > "$link_dir/status.txt"
            echo "$bin"
          }

          record_case() {
            local case_name="$1"
            local variant="$2"
            local bin="$3"
            local status="$4"
            local symbol="$5"
            local offset="$6"
            local expected="$7"
            local corrupt_ordinary="$8"
            local corrupt_plus="$9"
            local link_dir="$out_dir/${variant}"
            local run_status="NA"
            local object_line final_line object_expected final_expected final_corrupt_ordinary final_corrupt_plus
            object_line="$(cat "$out_dir/object.${case_name}.target-line.txt" 2>/dev/null || echo missing)"
            object_expected="$(count_bytes "$obj" "$expected")"
            final_line="missing"
            final_expected="NA"
            final_corrupt_ordinary="NA"
            final_corrupt_plus="NA"
            if [ "$status" -eq 0 ]; then
              target_line "$bin" "$symbol" "$offset" "$link_dir/final.${case_name}.target-line.txt"
              final_line="$(cat "$link_dir/final.${case_name}.target-line.txt")"
              final_expected="$(count_bytes "$bin" "$expected")"
              final_corrupt_ordinary="$(count_bytes "$bin" "$corrupt_ordinary")"
              final_corrupt_plus="$(count_bytes "$bin" "$corrupt_plus")"
              run_with_timeout 10 "$bin" > "$link_dir/run.log" 2>&1
              run_status=$?
            fi
            {
              echo "## ${case_name} / ${variant}"
              echo
              echo "- link_status: \`${status}\`"
              echo "- run_status: \`${run_status}\`"
              echo "- object target: \`${object_line}\`"
              echo "- final target: \`${final_line}\`"
              echo "- object expected count: \`${object_expected}\`"
              echo "- final expected count: \`${final_expected}\`"
              echo "- final ordinary-corrupt count: \`${final_corrupt_ordinary}\`"
              echo "- final plus-neon-corrupt count: \`${final_corrupt_plus}\`"
              echo
              echo "### final target window"
              echo
              echo "\`\`\`text"
              cat "$link_dir/final.${case_name}.target-line.txt.window" 2>/dev/null || true
              echo "\`\`\`"
              echo
              echo "### link log"
              echo
              echo "\`\`\`text"
              cat "$link_dir/link.log" 2>/dev/null || true
              echo "\`\`\`"
              echo
            } >> "$summary"
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$case_name" "$variant" "$status" "$run_status" "${object_line//$'\t'/ }" "${final_line//$'\t'/ }" \
              "$object_expected" "$final_expected" "$final_corrupt_ordinary" "$final_corrupt_plus" >> "$rows"
          }

          for variant in ld_new_no_lto ld_classic_no_lto; do
            if [ "$variant" = "ld_classic_no_lto" ]; then
              bin="$(link_with_ld "$variant" yes)"
            else
              bin="$(link_with_ld "$variant" no)"
            fi
            status="$(cat "$out_dir/${variant}/status.txt")"
            record_case b9fa "$variant" "$bin" "$status" "_case_b9fa_cluster" "0xdec" "85 fc ff 17" "85 f0 c2 17" "85 c0 c2 17"
            record_case 0c67 "$variant" "$bin" "$status" "_case_0c67_cluster" "0xeec" "fc 03 03 aa" "fc 0f 01 aa" "fc 7f 00 aa"
          done

          cat "$summary"
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-minimal-asm-cluster-shape
          path: neon-rej-diagnostics/**
