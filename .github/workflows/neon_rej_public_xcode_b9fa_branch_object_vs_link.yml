name: NEON rejection sampler public Xcode b9fa branch object vs link

"on":
  workflow_dispatch:

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  branch-object-vs-link:
    name: b9fa branch object vs link ${{ matrix.xcode_label }} ${{ matrix.variant }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode_label: xcode-15.0.1
            developer_dir: /Applications/Xcode_15.0.1.app/Contents/Developer
            variant: default
            extra_rustflags: ""
          - xcode_label: xcode-15.0.1
            developer_dir: /Applications/Xcode_15.0.1.app/Contents/Developer
            variant: ld_classic
            extra_rustflags: "-C link-arg=-Wl,-ld_classic"
          - xcode_label: xcode-15.4
            developer_dir: /Applications/Xcode_15.4.app/Contents/Developer
            variant: default
            extra_rustflags: ""

    steps:
      - name: Checkout public upstream libcrux
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: b9fa21c6d53dc2b7de2e50d1694af284cb55f769

      - name: Runner details
        run: |
          sw_vers
          uname -a
          sysctl hw.optional.AdvSIMD || true
          sysctl hw.optional.arm.AdvSIMD || true
          xcode-select -p || true
          xcodebuild -version || true
          rustc --version || true
          cargo --version || true

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        id: patch_deps
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Install historical toolchain
        id: install_toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Compare branch word in object and final binary
        if: ${{ always() && steps.patch_deps.outcome == 'success' && steps.install_toolchain.outcome == 'success' }}
        run: |
          set +e
          developer_dir="${{ matrix.developer_dir }}"
          variant="${{ matrix.variant }}"
          extra_rustflags="${{ matrix.extra_rustflags }}"
          out_dir="$PWD/neon-rej-diagnostics/b9fa-branch-object-vs-link-${{ matrix.xcode_label }}-${variant}"
          mkdir -p "$out_dir"
          summary="$out_dir/summary.md"
          test_filter="mlkem768::tests::pk_validation"
          target_hash="hda4635a55fb002f6"
          target_offset_hex="0x1514"
          failure=0

          {
            echo "# b9fa branch object-vs-link probe"
            echo
            echo "Commit: \`b9fa21c6d53dc2b7de2e50d1694af284cb55f769\`"
            echo "Xcode: \`${{ matrix.xcode_label }}\`"
            echo "Variant: \`${variant}\`"
            echo "Extra RUSTFLAGS: \`${extra_rustflags}\`"
            echo "Target: \`generate_keypair17h${target_hash} + ${target_offset_hex}\`"
            echo "Focused test: \`${test_filter}\`"
            echo
            echo "## Runner and toolchain"
            echo
            echo "\`\`\`text"
            sw_vers
            uname -a
            sysctl hw.optional.AdvSIMD || true
            sysctl hw.optional.arm.AdvSIMD || true
            DEVELOPER_DIR="${developer_dir}" xcodebuild -version || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find cc || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find ld || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find llvm-objdump || true
            DEVELOPER_DIR="${developer_dir}" ld -v || true
            DEVELOPER_DIR="${developer_dir}" ld -version_details || true
            DEVELOPER_DIR="${developer_dir}" xcrun --sdk macosx --show-sdk-path || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
            echo "\`\`\`"
            echo
          } > "$summary" 2>&1

          if [ ! -d "${developer_dir}" ]; then
            echo "Selected Xcode is absent; probe skipped." >> "$summary"
            cat "$summary"
            exit 0
          fi

          add_hex() {
            python3 - "$1" "$2" <<'PY'
          import sys
          print(f"0x{int(sys.argv[1], 16) + int(sys.argv[2], 16):x}")
          PY
          }

          find_test_binary() {
            local candidate
            for candidate in target/release/deps/libcrux_ml_kem-*; do
              if [ -f "$candidate" ] && file "$candidate" | grep -q 'Mach-O.*executable'; then
                printf '%s\n' "$candidate"
                return 0
              fi
            done
            return 1
          }

          find_target_object() {
            local mode="$1"
            local obj nm_file
            : > "$out_dir/${mode}.object-candidates.txt"
            while IFS= read -r obj; do
              nm_file="$out_dir/${mode}.$(basename "$obj").nm.txt"
              nm -nm "$obj" > "$nm_file" 2>&1
              if grep -q "$target_hash" "$nm_file"; then
                printf '%s\n' "$obj" >> "$out_dir/${mode}.object-candidates.txt"
                case "$(basename "$obj")" in
                  libcrux_ml_kem-*) printf '%s\n' "$obj"; return 0 ;;
                esac
              fi
            done < <(find target/release -type f -name '*.o' -print | sort)
            head -n 1 "$out_dir/${mode}.object-candidates.txt"
          }

          extract_address_window() {
            local in_file="$1"
            local center_hex="$2"
            local before_hex="$3"
            local after_hex="$4"
            local out_file="$5"
            python3 - "$in_file" "$center_hex" "$before_hex" "$after_hex" > "$out_file" <<'PY'
          import re
          import sys
          path, center_s, before_s, after_s = sys.argv[1:]
          center = int(center_s, 16)
          start = center - int(before_s, 16)
          stop = center + int(after_s, 16)
          address_re = re.compile(r"^\s*([0-9a-fA-F]+):")
          with open(path, "r", errors="replace") as f:
              for line in f:
                  m = address_re.match(line)
                  if not m:
                      continue
                  addr = int(m.group(1), 16)
                  if start <= addr <= stop:
                      sys.stdout.write(line)
          PY
          }

          extract_reloc_window() {
            local in_file="$1"
            local center_hex="$2"
            local before_hex="$3"
            local after_hex="$4"
            local out_file="$5"
            python3 - "$in_file" "$center_hex" "$before_hex" "$after_hex" > "$out_file" <<'PY'
          import re
          import sys
          path, center_s, before_s, after_s = sys.argv[1:]
          center = int(center_s, 16)
          start = center - int(before_s, 16)
          stop = center + int(after_s, 16)
          hex_re = re.compile(r"\b(?:0x)?([0-9a-fA-F]{4,16})\b")
          with open(path, "r", errors="replace") as f:
              for line in f:
                  for m in hex_re.finditer(line):
                      value = int(m.group(1), 16)
                      if start <= value <= stop:
                          sys.stdout.write(line)
                          break
          PY
          }

          scan_branch_words() {
            local root="$1"
            local out_file="$2"
            python3 - "$root" > "$out_file" <<'PY'
          import os
          import sys
          root = sys.argv[1]
          needles = {
              "bad_ordinary_85_f0_c2_17": bytes.fromhex("85 f0 c2 17"),
              "bad_plus_85_c0_c2_17": bytes.fromhex("85 c0 c2 17"),
              "good_backedge_85_fc_ff_17": bytes.fromhex("85 fc ff 17"),
          }
          if os.path.isfile(root):
              paths = [root]
          else:
              paths = []
              for dirpath, _, filenames in os.walk(root):
                  for name in filenames:
                      if name.endswith((".o", ".rlib", ".a")):
                          paths.append(os.path.join(dirpath, name))
          for path in sorted(paths):
              try:
                  data = open(path, "rb").read()
              except OSError:
                  continue
              for label, needle in needles.items():
                  start = 0
                  while True:
                      idx = data.find(needle, start)
                      if idx < 0:
                          break
                      print(f"{label} {path} offset=0x{idx:x}")
                      start = idx + 1
          PY
          }

          collect_file() {
            local mode="$1"
            local kind="$2"
            local path="$3"
            local symbol_addr="$4"
            local target_addr
            local dis="$out_dir/${mode}.${kind}.disassembly.txt"
            local win="$out_dir/${mode}.${kind}.target-window.txt"
            local rel_llvm="$out_dir/${mode}.${kind}.llvm-reloc.txt"
            local rel_otool="$out_dir/${mode}.${kind}.otool-reloc.txt"
            local rel_win="$out_dir/${mode}.${kind}.llvm-reloc-window.txt"
            local rel_otool_win="$out_dir/${mode}.${kind}.otool-reloc-window.txt"

            target_addr="$(add_hex "0x${symbol_addr#0x}" "$target_offset_hex")"

            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
              --macho \
              --arch=arm64 \
              --demangle \
              --disassemble \
              "$path" > "$dis" 2>&1
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
              --macho \
              --arch=arm64 \
              --reloc \
              "$path" > "$rel_llvm" 2>&1
            otool -rvV "$path" > "$rel_otool" 2>&1
            extract_address_window "$dis" "$target_addr" 0x40 0x60 "$win"
            extract_reloc_window "$rel_llvm" "$target_addr" 0x40 0x60 "$rel_win"
            extract_reloc_window "$rel_otool" "$target_addr" 0x40 0x60 "$rel_otool_win"

            {
              echo "### ${mode} ${kind}"
              echo
              echo "- path: \`${path}\`"
              echo "- symbol address: \`0x${symbol_addr#0x}\`"
              echo "- target address: \`${target_addr}\`"
              echo
              echo "#### Target disassembly window"
              echo
              echo "\`\`\`text"
              cat "$win"
              echo "\`\`\`"
              echo
              echo "#### Relocation windows"
              echo
              echo "\`\`\`text"
              echo "llvm-objdump:"
              cat "$rel_win"
              echo
              echo "otool:"
              cat "$rel_otool_win"
              echo "\`\`\`"
              echo
            } >> "$summary"
          }

          build_mode() {
            local mode="$1"
            local target_feature_flags=""
            local build_log="$out_dir/${mode}.build.log"
            local run_log="$out_dir/${mode}.focused-test.log"
            local map_file="$out_dir/${mode}.link.map"
            local rustflags build_status run_status bin bin_abs obj obj_nm final_nm obj_addr final_addr

            if [ "$mode" = "plus-neon" ]; then
              target_feature_flags="-C target_feature=+neon"
            fi
            rustflags="-C save-temps ${target_feature_flags} ${extra_rustflags} -C link-arg=-Wl,-map,${map_file}"

            {
              echo "## Mode: ${mode}"
              echo
              echo "- RUSTFLAGS: \`${rustflags}\`"
              echo
            } >> "$summary"

            pushd libcrux-ml-kem >/dev/null
            cargo +1.78.0 clean >> "$summary" 2>&1
            DEVELOPER_DIR="${developer_dir}" \
              RUSTFLAGS="${rustflags}" \
              cargo +1.78.0 test --verbose --release --no-run \
              > "$build_log" 2>&1
            build_status=$?
            DEVELOPER_DIR="${developer_dir}" \
              RUSTFLAGS="${rustflags}" \
              cargo +1.78.0 test --release "${test_filter}" -- --exact --nocapture \
              > "$run_log" 2>&1
            run_status=$?
            popd >/dev/null

            {
              echo "- build exit: \`${build_status}\`"
              echo "- focused test exit: \`${run_status}\`"
              echo "- build log: \`${build_log}\`"
              echo "- focused test log: \`${run_log}\`"
              echo "- link map: \`${map_file}\`"
              echo
            } >> "$summary"

            if [ "$build_status" -ne 0 ]; then
              failure=1
              return
            fi

            bin="$(find_test_binary)"
            obj="$(find_target_object "$mode")"
            if [ -z "$bin" ] || [ -z "$obj" ]; then
              echo "- selected binary or target object missing" >> "$summary"
              failure=1
              return
            fi
            bin_abs="$(cd "$(dirname "$bin")" && pwd)/$(basename "$bin")"

            final_nm="$out_dir/${mode}.final.nm.txt"
            obj_nm="$out_dir/${mode}.target-object.nm.txt"
            nm -nm "$bin_abs" > "$final_nm" 2>&1
            nm -nm "$obj" > "$obj_nm" 2>&1
            final_addr="$(awk -v h="$target_hash" '$0 ~ h { print $1; exit }' "$final_nm")"
            obj_addr="$(awk -v h="$target_hash" '$0 ~ h { print $1; exit }' "$obj_nm")"

            if [ -z "$final_addr" ] || [ -z "$obj_addr" ]; then
              echo "- target symbol address missing" >> "$summary"
              failure=1
              return
            fi

            scan_branch_words "$bin_abs" "$out_dir/${mode}.final.branch-word-scan.txt"
            scan_branch_words "target/release" "$out_dir/${mode}.objects.branch-word-scan.txt"
            collect_file "$mode" final "$bin_abs" "$final_addr"
            collect_file "$mode" object "$obj" "$obj_addr"

            {
              echo "### ${mode} branch word scan"
              echo
              echo "\`\`\`text"
              echo "final binary:"
              cat "$out_dir/${mode}.final.branch-word-scan.txt"
              echo "objects / archives:"
              cat "$out_dir/${mode}.objects.branch-word-scan.txt"
              echo "\`\`\`"
              echo
              echo "### ${mode} focused test tail"
              echo
              echo "\`\`\`text"
              tail -n 60 "$run_log"
              echo "\`\`\`"
              echo
            } >> "$summary"
          }

          build_mode ordinary
          build_mode plus-neon

          cat "$summary"
          exit "$failure"

      - name: Upload b9fa branch object-vs-link diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-b9fa-branch-object-vs-link-${{ matrix.xcode_label }}-${{ matrix.variant }}
          path: neon-rej-diagnostics/b9fa-branch-object-vs-link-${{ matrix.xcode_label }}-${{ matrix.variant }}
