name: NEON rejection sampler public Xcode PR287 scalar guard n_value sweep

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/neon_rej_public_xcode_pr287_scalar_guard_nvalue_sweep.yml
      - .github/scripts/retarget_macho_relocs.py
      - .github/scripts/patch_macho_symbol_values.py
      - .github/scripts/patch_macho_symbol_metadata.py
      - .github/scripts/dump_pr287_reloc_context.py
      - .github/scripts/scan_pr287_bad_word.py
      - .github/scripts/summarize_pr287_nvalue_sweep.py
      - .github/scripts/patch_pr287_rejsample_scalar_guard.py

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  pr287-scalar-guard-nvalue-sweep:
    name: pr287 scalar-guard n_value patch sweep
    runs-on: macos-14

    steps:
      - name: Checkout probe repository
        uses: actions/checkout@v4
        with:
          path: harness

      - name: Checkout public upstream libcrux at PR287 fallback commit
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: 76ab582c79998d5ef77e6e6b6d287c6b1ff0106d
          path: libcrux

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        working-directory: libcrux
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Re-enable NEON rejection sampler with scalar guard
        working-directory: libcrux
        run: |
          perl -0pi -e 's#// mod rejsample;#mod rejsample;#' polynomials-aarch64/src/lib.rs
          perl -0pi -e 's#rej_sample\(a, out\)#rejsample::rej_sample(a, out)#' polynomials-aarch64/src/lib.rs
          python3 ../harness/.github/scripts/patch_pr287_rejsample_scalar_guard.py
          git diff -- polynomials-aarch64/src/lib.rs polynomials-aarch64/src/rejsample.rs

      - name: Install historical toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Build and sweep patched n_value variants
        working-directory: libcrux
        env:
          DEVELOPER_DIR: /Applications/Xcode_15.0.1.app/Contents/Developer
          RUSTFLAGS: -C save-temps -C debuginfo=2
        run: |
          set -o pipefail
          diag="neon-rej-diagnostics/pr287-scalar-guard-nvalue-sweep"
          pattern_words="0xce162400 0x6e3b1fa2 0xce1b3ba3 0xce0e2842 0xce0a2063 0x6e2b1ea4 0xce0b36a5 0xce0d3c84 0x4e803241 0xce0f40b2 0xce1c1b25 0x4eb11e3c 0x4eb61ed1 0x3dc1efe7 0xce1a1cb8 0xce88fc42"
          mkdir -p "${diag}/variants"
          {
            echo "label=pr287 scalar-guard n_value patch sweep"
            echo "developer_dir=${DEVELOPER_DIR}"
            sw_vers
            uname -a
            xcodebuild -version
            xcrun --find cc
            xcrun --find ld
            xcrun --show-sdk-path
            ld -v || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
          } | tee "${diag}/toolchain.log"

          cargo +1.78.0 test \
            --manifest-path libcrux-ml-kem/Cargo.toml \
            --release \
            --test nistkats \
            --no-run \
            2>&1 | tee "${diag}/build.log"

          bin="$(pwd)/$(find target/release/deps -maxdepth 1 -type f -perm +111 -name 'nistkats-*' | head -n 1)"
          test -x "${bin}"
          python3 ../harness/.github/scripts/scan_pr287_bad_word.py \
            --root target/release/deps \
            --bin "${bin}" \
            --pattern-words "${pattern_words}" \
            --bad-word 0x4e803241 \
            --bad-index 8 \
            --out "${diag}/cargo-final-scan.json" \
            2>&1 | tee "${diag}/cargo-final-scan.log"

          selected_obj="$(
            python3 -c 'import json; d=json.load(open("'"${diag}/cargo-final-scan.json"'")); print(next(e["path"] for e in d["interesting_files"] if "Mach-O 64-bit object" in e["kind"] and e["wildcard_context_match_count"]))'
          )"
          test -f "${selected_obj}"
          cp "${selected_obj}" "${diag}/selected.o"
          nm -nm "${selected_obj}" | grep 'lCPI[0-9][0-9]*_' | tee "${diag}/lcpi-symbols.txt"
          rustlib="$(rustc +1.78.0 --print target-libdir)"
          compiler_builtins="$(ls "${rustlib}"/libcompiler_builtins-*.rlib | head -n 1)"
          test -f "${compiler_builtins}"
          {
            echo "selected_obj=${selected_obj}"
            file "${selected_obj}" || true
            shasum -a 256 "${selected_obj}" || true
            echo "rustlib=${rustlib}"
            echo "compiler_builtins=${compiler_builtins}"
          } | tee "${diag}/selected-object.log"

          python3 ../harness/.github/scripts/dump_pr287_reloc_context.py \
            --object "${selected_obj}" \
            --scan-json "${diag}/cargo-final-scan.json" \
            --out-json "${diag}/reloc-context.json" \
            --out-md "${diag}/reloc-context.md"

          pair_info="$(
            python3 -c 'import json,re; d=json.load(open("'"${diag}/reloc-context.json"'")); pairs=[p for p in d["candidate_page21_pageoff_pairs"] if re.fullmatch(r"lCPI[0-9]+_2", p["symbol"]) and p["matched_base_reg"]]; pairs.sort(key=lambda p: (abs(p["page21_delta"])+abs(p["pageoff_delta"]), abs(p["pageoff_delta"]))); p=pairs[0]; print("{} {} {} {}".format(p["page21_index"], p["pageoff_index"], p["symbol"], p["symbol_value"]))'
          )"
          set -- ${pair_info}
          pair_page21_index="$1"
          pair_pageoff_index="$2"
          pair_symbol="$3"
          pair_symbol_value="$4"
          pair_prefix="${pair_symbol%_2}"
          {
            echo "pair_page21_index=${pair_page21_index}"
            echo "pair_pageoff_index=${pair_pageoff_index}"
            echo "pair_symbol=${pair_symbol}"
            echo "pair_symbol_value=${pair_symbol_value}"
            echo "pair_prefix=${pair_prefix}"
          } | tee "${diag}/selected-pair.log"

          value_of_symbol() {
            awk -v sym="$1" '$NF == sym { print "0x"$1; found=1; exit } END { if (!found) exit 1 }' "${diag}/lcpi-symbols.txt"
          }
          symbol_2="${pair_prefix}_2"
          symbol_5="${pair_prefix}_5"
          symbol_8="${pair_prefix}_8"
          symbol_23="${pair_prefix}_23"
          symbol_31="${pair_prefix}_31"
          value_2="$(value_of_symbol "${symbol_2}")"
          value_5="$(value_of_symbol "${symbol_5}")"
          value_8="$(value_of_symbol "${symbol_8}")"
          value_23="$(value_of_symbol "${symbol_23}")"
          value_31="$(value_of_symbol "${symbol_31}")"
          {
            echo "symbol_2=${symbol_2}"
            echo "value_2=${value_2}"
            echo "symbol_5=${symbol_5}"
            echo "value_5=${value_5}"
            echo "symbol_8=${symbol_8}"
            echo "value_8=${value_8}"
            echo "symbol_23=${symbol_23}"
            echo "value_23=${value_23}"
            echo "symbol_31=${symbol_31}"
            echo "value_31=${value_31}"
          } | tee "${diag}/selected-values.log"

          make_nvalue_variant() {
            local label="$1"
            local target_symbol="$2"
            local patch_value="$3"
            local out_dir="${diag}/variants/${label}"
            mkdir -p "${out_dir}"
            python3 ../harness/.github/scripts/retarget_macho_relocs.py \
              --input "${selected_obj}" \
              --output "${out_dir}/retargeted.o" \
              --out-json "${out_dir}/retarget.json" \
              --map "${pair_page21_index}=${target_symbol}" \
              --map "${pair_pageoff_index}=${target_symbol}" \
              2>&1 | tee "${out_dir}/retarget.log"
            if [ -n "${patch_value}" ]; then
              python3 ../harness/.github/scripts/patch_macho_symbol_values.py \
                --input "${out_dir}/retargeted.o" \
                --output "${out_dir}/input.o" \
                --out-json "${out_dir}/symbol-patch.json" \
                --set "${target_symbol}=${patch_value}" \
                2>&1 | tee "${out_dir}/symbol-patch.log"
            else
              cp "${out_dir}/retargeted.o" "${out_dir}/input.o"
              echo '{"changes":[]}' > "${out_dir}/symbol-patch.json"
            fi
          }

          make_metadata_variant() {
            local label="$1"
            local target_symbol="$2"
            local source_symbol="$3"
            local fields="${4:-type,sect,desc}"
            local out_dir="${diag}/variants/${label}"
            mkdir -p "${out_dir}"
            python3 ../harness/.github/scripts/retarget_macho_relocs.py \
              --input "${selected_obj}" \
              --output "${out_dir}/retargeted.o" \
              --out-json "${out_dir}/retarget.json" \
              --map "${pair_page21_index}=${target_symbol}" \
              --map "${pair_pageoff_index}=${target_symbol}" \
              2>&1 | tee "${out_dir}/retarget.log"
            python3 ../harness/.github/scripts/patch_macho_symbol_metadata.py \
              --input "${out_dir}/retargeted.o" \
              --output "${out_dir}/input.o" \
              --out-json "${out_dir}/symbol-patch.json" \
              --copy "${target_symbol}=${source_symbol}" \
              --fields "${fields}" \
              2>&1 | tee "${out_dir}/symbol-patch.log"
          }

          relink_variant() {
            local label="$1"
            local out_dir="${diag}/variants/${label}"
            local obj="${out_dir}/input.o"
            local manual_bin_abs="$(pwd)/${out_dir}/nistkats.manual"
            local manual_map="${out_dir}/nistkats.manual.map"
            local manual_link_log="${out_dir}/link.log"
            local args=(
              -arch arm64
              -nodefaultlibs
              -o "${manual_bin_abs}"
              "${obj}"
              "${compiler_builtins}"
              -L "$(pwd)/target/release/deps"
              -L "${rustlib}"
              -liconv
              -lSystem
              -lc
              -lm
              -Wl,-dead_strip
              -Wl,-map,"${manual_map}"
            )
            {
              printf 'DEVELOPER_DIR=%q xcrun cc' "${DEVELOPER_DIR}"
              printf ' %q' "${args[@]}"
              echo
            } | tee "${out_dir}/command.log"
            if DEVELOPER_DIR="${DEVELOPER_DIR}" xcrun cc "${args[@]}" > "${manual_link_log}" 2>&1; then
              echo "manual_link_status=0" | tee "${out_dir}/meta.log"
            else
              status=$?
              echo "manual_link_status=${status}" | tee "${out_dir}/meta.log"
              return 0
            fi
            python3 ../harness/.github/scripts/scan_pr287_bad_word.py \
              --root "${out_dir}" \
              --bin "${manual_bin_abs}" \
              --pattern-words "${pattern_words}" \
              --bad-word 0x4e803241 \
              --bad-index 8 \
              --out "${out_dir}/scan.json" \
              2>&1 | tee "${out_dir}/scan.log"
          }

          make_nvalue_variant pair_lcpi2_unpatched "${symbol_2}" ""
          make_nvalue_variant pair_lcpi2_value_lcpi5 "${symbol_2}" "${value_5}"
          make_nvalue_variant pair_lcpi2_value_lcpi8 "${symbol_2}" "${value_8}"
          make_nvalue_variant pair_lcpi2_value_lcpi23 "${symbol_2}" "${value_23}"
          make_nvalue_variant pair_lcpi2_value_lcpi31 "${symbol_2}" "${value_31}"
          make_nvalue_variant pair_lcpi8_unpatched "${symbol_8}" ""
          make_nvalue_variant pair_lcpi8_value_lcpi2 "${symbol_8}" "${value_2}"
          make_nvalue_variant pair_lcpi8_value_lcpi5 "${symbol_8}" "${value_5}"
          make_nvalue_variant pair_lcpi8_value_lcpi23 "${symbol_8}" "${value_23}"
          make_nvalue_variant pair_lcpi8_value_lcpi31 "${symbol_8}" "${value_31}"
          make_nvalue_variant pair_lcpi23_unpatched "${symbol_23}" ""
          make_nvalue_variant pair_lcpi23_value_lcpi8 "${symbol_23}" "${value_8}"
          make_nvalue_variant pair_lcpi23_value_lcpi31 "${symbol_23}" "${value_31}"
          make_nvalue_variant pair_lcpi31_unpatched "${symbol_31}" ""
          make_nvalue_variant pair_lcpi31_value_lcpi8 "${symbol_31}" "${value_8}"
          make_nvalue_variant pair_lcpi5_unpatched "${symbol_5}" ""
          make_nvalue_variant pair_lcpi5_value_lcpi8 "${symbol_5}" "${value_8}"
          make_metadata_variant pair_lcpi2_meta_lcpi5_keep_value "${symbol_2}" "${symbol_5}"
          make_metadata_variant pair_lcpi2_meta_lcpi8_keep_value "${symbol_2}" "${symbol_8}"
          make_metadata_variant pair_lcpi2_meta_lcpi23_keep_value "${symbol_2}" "${symbol_23}"
          make_metadata_variant pair_lcpi2_meta_lcpi31_keep_value "${symbol_2}" "${symbol_31}"
          make_metadata_variant pair_lcpi8_meta_lcpi2_keep_value "${symbol_8}" "${symbol_2}"
          make_metadata_variant pair_lcpi23_meta_lcpi2_keep_value "${symbol_23}" "${symbol_2}"

          for variant_dir in "${diag}/variants"/*; do
            relink_variant "$(basename "${variant_dir}")"
          done

          python3 ../harness/.github/scripts/summarize_pr287_nvalue_sweep.py \
            --variants-root "${diag}/variants" \
            --out-json "${diag}/nvalue-sweep-summary.json" \
            --out-md "${diag}/nvalue-sweep-summary.md"

          {
            echo "# PR287 n_value patch sweep"
            echo
            echo "## cargo final"
            cat "${diag}/cargo-final-scan.log"
            echo
            echo "## n_value sweep"
            cat "${diag}/nvalue-sweep-summary.md"
          } | tee "${diag}/summary.md"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-pr287-scalar-guard-nvalue-sweep
          path: |
            libcrux/neon-rej-diagnostics/**/*.json
            libcrux/neon-rej-diagnostics/**/*.log
            libcrux/neon-rej-diagnostics/**/*.md
            libcrux/neon-rej-diagnostics/**/*.txt
