name: NEON rejection sampler public Xcode PR287 scalar guard manual relink

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/neon_rej_public_xcode_pr287_scalar_guard_manual_relink.yml

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  pr287-scalar-guard-manual-relink:
    name: pr287 scalar-guard manual relink
    runs-on: macos-14

    steps:
      - name: Checkout probe repository
        uses: actions/checkout@v4
        with:
          path: harness

      - name: Checkout public upstream libcrux at PR287 fallback commit
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: 76ab582c79998d5ef77e6e6b6d287c6b1ff0106d
          path: libcrux

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        working-directory: libcrux
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Re-enable NEON rejection sampler with scalar guard
        working-directory: libcrux
        run: |
          perl -0pi -e 's#// mod rejsample;#mod rejsample;#' polynomials-aarch64/src/lib.rs
          perl -0pi -e 's#rej_sample\(a, out\)#rejsample::rej_sample(a, out)#' polynomials-aarch64/src/lib.rs
          python3 ../harness/.github/scripts/patch_pr287_rejsample_scalar_guard.py
          git diff -- polynomials-aarch64/src/lib.rs polynomials-aarch64/src/rejsample.rs

      - name: Install historical toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Build, capture cargo crash, and manually relink saved object
        working-directory: libcrux
        env:
          DEVELOPER_DIR: /Applications/Xcode_15.0.1.app/Contents/Developer
          RUST_BACKTRACE: "1"
          RUSTFLAGS: -C save-temps -C debuginfo=2
        run: |
          set -o pipefail
          diag="neon-rej-diagnostics/pr287-scalar-guard-manual-relink"
          mkdir -p "${diag}/manual"
          {
            echo "label=pr287 scalar-guard manual relink"
            echo "build_developer_dir=${DEVELOPER_DIR}"
            sw_vers
            uname -a
            xcodebuild -version
            xcrun --find cc
            xcrun --find ld
            xcrun --show-sdk-path
            ld -v || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
            lldb --version
          } | tee "${diag}/toolchain.log"

          cargo +1.78.0 test \
            --manifest-path libcrux-ml-kem/Cargo.toml \
            --release \
            --test nistkats \
            --no-run \
            2>&1 | tee "${diag}/build.log"

          bin="$(pwd)/$(find target/release/deps -maxdepth 1 -type f -perm +111 -name 'nistkats-*' | head -n 1)"
          test -x "${bin}"
          echo "binary=${bin}" | tee "${diag}/lldb.log"
          echo "process_cwd=$(pwd)/libcrux-ml-kem" | tee -a "${diag}/lldb.log"
          {
            echo "### cargo final binary"
            file "${bin}" || true
            shasum -a 256 "${bin}" || true
            echo "### lldb"
            lldb --batch \
              -o "settings set target.process.thread.step-avoid-regexp ^$" \
              -k "thread list" \
              -k "thread backtrace all" \
              -k "register read" \
              -k "disassemble --pc --count 40" \
              -k 'image lookup --address `$pc`' \
              -k 'memory read --format x --size 4 --count 16 `$pc-32`' \
              -o "process launch --working-dir $(pwd)/libcrux-ml-kem -- --nocapture" \
              "${bin}" || true
          } 2>&1 | tee -a "${diag}/lldb.log"

          python3 ../harness/.github/scripts/scan_pr287_bad_word.py \
            --root target/release/deps \
            --bin "${bin}" \
            --lldb-log "${diag}/lldb.log" \
            --out "${diag}/cargo-final-scan.json" \
            2>&1 | tee "${diag}/cargo-final-scan.log"

          selected_obj="$(
            python3 -c 'import json; d=json.load(open("'"${diag}/cargo-final-scan.json"'")); print(next(e["path"] for e in d["interesting_files"] if "Mach-O 64-bit object" in e["kind"] and e["wildcard_context_match_count"]))'
          )"
          test -f "${selected_obj}"
          rustlib="$(rustc +1.78.0 --print target-libdir)"
          compiler_builtins="$(ls "${rustlib}"/libcompiler_builtins-*.rlib | head -n 1)"
          test -f "${compiler_builtins}"
          {
            echo "selected_obj=${selected_obj}"
            file "${selected_obj}" || true
            shasum -a 256 "${selected_obj}" || true
            echo "rustlib=${rustlib}"
            echo "compiler_builtins=${compiler_builtins}"
          } | tee "${diag}/selected-object.log"

          run_relink() {
            local label="$1"
            local developer_dir="$2"
            local extra_flags="$3"
            local out_dir="${diag}/manual/${label}"
            local manual_bin="${out_dir}/nistkats.manual"
            local manual_bin_abs="$(pwd)/${manual_bin}"
            local manual_map="${out_dir}/nistkats.manual.map"
            local manual_dash="${out_dir}/cc-dash.log"
            local manual_link_log="${out_dir}/link.log"
            mkdir -p "${out_dir}"
            {
              echo "label=${label}"
              echo "developer_dir=${developer_dir}"
              echo "extra_flags=${extra_flags}"
            } | tee "${out_dir}/meta.log"
            if [ ! -d "${developer_dir}" ]; then
              echo "SKIP missing developer_dir=${developer_dir}" | tee -a "${out_dir}/meta.log"
              return 0
            fi
            read -r -a extra_array <<< "${extra_flags}"
            args=(
              -arch arm64
              -nodefaultlibs
              -o "${manual_bin_abs}"
              "${selected_obj}"
              "${compiler_builtins}"
              -L "$(pwd)/target/release/deps"
              -L "${rustlib}"
              -liconv
              -lSystem
              -lc
              -lm
              -Wl,-dead_strip
              -Wl,-map,"${manual_map}"
            )
            if [ -n "${extra_flags}" ]; then
              args+=("${extra_array[@]}")
            fi
            {
              printf 'DEVELOPER_DIR=%q xcrun cc' "${developer_dir}"
              printf ' %q' "${args[@]}"
              echo
            } | tee "${out_dir}/command.log"
            DEVELOPER_DIR="${developer_dir}" xcrun cc -### "${args[@]}" > "${manual_dash}" 2>&1 || true
            if DEVELOPER_DIR="${developer_dir}" xcrun cc "${args[@]}" > "${manual_link_log}" 2>&1; then
              echo "manual_link_status=0" | tee -a "${out_dir}/meta.log"
            else
              status=$?
              echo "manual_link_status=${status}" | tee -a "${out_dir}/meta.log"
              return 0
            fi
            file "${manual_bin_abs}" | tee "${out_dir}/file.log"
            shasum -a 256 "${manual_bin_abs}" | tee "${out_dir}/sha256.log"
            python3 ../harness/.github/scripts/scan_pr287_bad_word.py \
              --root "${out_dir}" \
              --bin "${manual_bin_abs}" \
              --lldb-log "${diag}/lldb.log" \
              --out "${out_dir}/scan.json" \
              2>&1 | tee "${out_dir}/scan.log"
            (
              cd libcrux-ml-kem
              "${manual_bin_abs}" kyber768_nist_known_answer_tests --exact --nocapture
            ) > "${out_dir}/run.log" 2>&1 || echo "manual_run_status=$?" | tee -a "${out_dir}/meta.log"
          }

          run_relink xcode15_0_1_new /Applications/Xcode_15.0.1.app/Contents/Developer ""
          run_relink xcode15_0_1_ld_classic /Applications/Xcode_15.0.1.app/Contents/Developer "-Wl,-ld_classic"
          run_relink xcode15_4_new /Applications/Xcode_15.4.app/Contents/Developer ""
          run_relink xcode15_4_ld_classic /Applications/Xcode_15.4.app/Contents/Developer "-Wl,-ld_classic"

          {
            echo "# manual relink summary"
            echo
            echo "## cargo final"
            cat "${diag}/cargo-final-scan.log"
            echo
            for scan in "${diag}"/manual/*/scan.log; do
              [ -f "${scan}" ] || continue
              echo "## ${scan}"
              cat "${scan}"
              echo
            done
          } | tee "${diag}/summary.md"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-pr287-scalar-guard-manual-relink
          path: libcrux/neon-rej-diagnostics/**
