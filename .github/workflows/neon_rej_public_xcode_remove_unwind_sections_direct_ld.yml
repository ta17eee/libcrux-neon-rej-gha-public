name: NEON rejection sampler public Xcode remove unwind sections direct ld

"on":
  workflow_dispatch:

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  remove-unwind-sections-direct-ld:
    name: ${{ matrix.probe.label }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        probe:
          - label: 0c67 ordinary
            artifact_suffix: 0c67-ordinary
            ref: 0c67a85b028f74bac401f6adf14581b2e05104e1
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --test nistkats --no-run
            preferred_object_glob: nistkats-*
            target_hash: h8997d6f42564fb09
            target_offset_hex: "0x2d3c"
            target_feature_flags: ""
            expected_bytes: "fc 03 03 aa"
            corrupt_bytes: "fc 0f 01 aa"
          - label: 0c67 plus-neon
            artifact_suffix: 0c67-plus-neon
            ref: 0c67a85b028f74bac401f6adf14581b2e05104e1
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --test nistkats --no-run
            preferred_object_glob: nistkats-*
            target_hash: h8997d6f42564fb09
            target_offset_hex: "0x2d3c"
            target_feature_flags: "-C target_feature=+neon"
            expected_bytes: "fc 03 03 aa"
            corrupt_bytes: "fc 7f 00 aa"
          - label: b9fa ordinary
            artifact_suffix: b9fa-ordinary
            ref: b9fa21c6d53dc2b7de2e50d1694af284cb55f769
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --no-run
            preferred_object_glob: libcrux_ml_kem-*
            target_hash: hda4635a55fb002f6
            target_offset_hex: "0x1514"
            target_feature_flags: ""
            expected_bytes: "85 fc ff 17"
            corrupt_bytes: "85 f0 c2 17"
          - label: b9fa plus-neon
            artifact_suffix: b9fa-plus-neon
            ref: b9fa21c6d53dc2b7de2e50d1694af284cb55f769
            cargo_args: --manifest-path libcrux-ml-kem/Cargo.toml --verbose --release --no-run
            preferred_object_glob: libcrux_ml_kem-*
            target_hash: hda4635a55fb002f6
            target_offset_hex: "0x1514"
            target_feature_flags: "-C target_feature=+neon"
            expected_bytes: "85 fc ff 17"
            corrupt_bytes: "85 c0 c2 17"

    steps:
      - name: Checkout public upstream libcrux
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: ${{ matrix.probe.ref }}

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        id: patch_deps
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Install historical toolchain
        id: install_toolchain
        run: |
          rustup toolchain install 1.78.0
          rustup component add llvm-tools-preview --toolchain 1.78.0

      - name: Remove unwind sections and direct-link
        if: ${{ always() && steps.patch_deps.outcome == 'success' && steps.install_toolchain.outcome == 'success' }}
        run: |
          set +e
          developer_dir="/Applications/Xcode_15.0.1.app/Contents/Developer"
          label="${{ matrix.probe.label }}"
          commit="${{ matrix.probe.ref }}"
          cargo_args="${{ matrix.probe.cargo_args }}"
          preferred_object_glob="${{ matrix.probe.preferred_object_glob }}"
          target_hash="${{ matrix.probe.target_hash }}"
          target_offset_hex="${{ matrix.probe.target_offset_hex }}"
          target_feature_flags="${{ matrix.probe.target_feature_flags }}"
          expected_bytes="${{ matrix.probe.expected_bytes }}"
          corrupt_bytes="${{ matrix.probe.corrupt_bytes }}"
          target_root="$PWD/target/release"
          out_dir="$PWD/neon-rej-diagnostics/remove-unwind-sections-direct-ld-${{ matrix.probe.artifact_suffix }}"
          mkdir -p "$out_dir"
          summary="$out_dir/summary.md"
          rows="$out_dir/summary.rows.tsv"

          {
            echo "# Remove unwind sections direct ld probe"
            echo
            echo "Label: \`${label}\`"
            echo "Commit: \`${commit}\`"
            echo "Developer dir: \`${developer_dir}\`"
            echo "Target feature flags: \`${target_feature_flags}\`"
            echo "Target: \`generate_keypair17${target_hash} + ${target_offset_hex}\`"
            echo "Expected target bytes: \`${expected_bytes}\`"
            echo "Known corrupt bytes for Xcode 15.0.1 new ld: \`${corrupt_bytes}\`"
            echo
            echo "## Runner and toolchain"
            echo
            echo "\`\`\`text"
            sw_vers
            uname -a
            sysctl hw.optional.AdvSIMD || true
            DEVELOPER_DIR="${developer_dir}" xcodebuild -version || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find ld || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find llvm-objcopy || true
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objcopy --version || true
            command -v llvm-objcopy || true
            /opt/homebrew/opt/llvm/bin/llvm-objcopy --version || true
            /usr/local/opt/llvm/bin/llvm-objcopy --version || true
            rust_sysroot="$(rustc +1.78.0 --print sysroot)"
            rust_host="$(rustc +1.78.0 -vV | awk '/^host:/ { print $2 }')"
            "${rust_sysroot}/lib/rustlib/${rust_host}/bin/llvm-objcopy" --version || true
            DEVELOPER_DIR="${developer_dir}" xcrun --show-sdk-path || true
            DEVELOPER_DIR="${developer_dir}" ld -v || true
            DEVELOPER_DIR="${developer_dir}" ld -version_details || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
            echo "\`\`\`"
            echo
          } > "$summary" 2>&1

          printf 'case\tobject_variant\tremove_sections\ttransform_status\tlink_variant\tlink_status\tobject_line\tfinal_line\tobject_sha256\tfinal_sha256\tdwarf_sections\ttext_relocs\tdebug_info_relocs\tcompact_unwind_relocs\teh_frame_relocs\tobject_expected_count\tobject_corrupt_count\tfinal_expected_count\tfinal_corrupt_count\n' > "$rows"

          add_hex() {
            python3 - "$1" "$2" <<'PY'
          import sys
          print(f"{int(sys.argv[1], 16) + int(sys.argv[2], 16):x}")
          PY
          }

          count_bytes() {
            local path="$1"
            local pattern="$2"
            python3 - "$path" "$pattern" <<'PY'
          import sys
          path, pattern = sys.argv[1:]
          try:
              data = open(path, "rb").read()
          except OSError:
              print("NA")
              raise SystemExit(0)
          needle = bytes(int(x, 16) for x in pattern.split())
          if not needle:
              print("NA")
              raise SystemExit(0)
          count = 0
          start = 0
          while True:
              idx = data.find(needle, start)
              if idx < 0:
                  break
              count += 1
              start = idx + 1
          print(count)
          PY
          }

          find_target_object() {
            local obj nm_file first_match=""
            : > "$out_dir/object-candidates.txt"
            while IFS= read -r obj; do
              nm_file="$out_dir/$(basename "$obj").nm.txt"
              nm -nm "$obj" > "$nm_file" 2>&1
              if grep -q "$target_hash" "$nm_file"; then
                printf '%s\n' "$obj" >> "$out_dir/object-candidates.txt"
                [ -z "$first_match" ] && first_match="$obj"
                case "$(basename "$obj")" in
                  ${preferred_object_glob}) printf '%s\n' "$obj"; return 0 ;;
                esac
              fi
            done < <(find "$target_root" -type f -name '*.o' -print | sort)
            [ -n "$first_match" ] && printf '%s\n' "$first_match"
          }

          target_line() {
            local kind="$1"
            local path="$2"
            local out_file="$3"
            local symbol_addr target_addr start_addr stop_addr dis_file
            dis_file="$out_file.window"
            nm -nm "$path" > "${out_file}.nm.txt" 2>&1
            symbol_addr="$(awk -v h="$target_hash" '$0 ~ h { print $1; exit }' "${out_file}.nm.txt")"
            if ! printf '%s' "$symbol_addr" | grep -Eq '^[0-9a-fA-F]+$'; then
              echo "missing" > "$out_file"
              return 0
            fi
            target_addr="$(add_hex "0x${symbol_addr}" "$target_offset_hex")"
            start_addr="$(python3 - "$target_addr" <<'PY'
          import sys
          print(hex(max(0, int(sys.argv[1], 16) - 0x40)))
          PY
          )"
            stop_addr="$(python3 - "$target_addr" <<'PY'
          import sys
          print(hex(int(sys.argv[1], 16) + 0x50))
          PY
          )"
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
              --macho --arch=arm64 --demangle --disassemble \
              --start-address="${start_addr}" --stop-address="${stop_addr}" \
              "$path" > "$dis_file" 2>&1
            python3 - "$dis_file" "$target_addr" "$out_file" <<'PY'
          import re, sys
          path, target_s, out = sys.argv[1:]
          target = int(target_s, 16)
          lines = open(path, errors="replace").read().splitlines()
          found = "missing"
          for line in lines:
              m = re.match(r"\s*([0-9a-fA-F]+):\s*(.*)", line)
              if m and int(m.group(1), 16) == target:
                  found = line.strip()
                  break
          open(out, "w").write(found + "\n")
          PY
          }

          dump_object_metadata() {
            local variant="$1"
            local obj="$2"
            local dir="$out_dir/objects/${variant}"
            mkdir -p "$dir"
            otool -l "$obj" > "$dir/otool-load-commands.txt" 2>&1 || true
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump --macho --arch=arm64 --reloc "$obj" > "$dir/objdump-relocs.txt" 2>&1 || true
            target_line "object-${variant}" "$obj" "$dir/object.target-line.txt"
          }

          count_relocs() {
            local file="$1"
            local section="$2"
            awk -v s="$section" '
              index($0, "Relocation information (" s ")") { print $(NF-1); found=1 }
              END { if (!found) print 0 }
            ' "$file"
          }

          remove_sections() {
            local variant="$1"
            shift
            local output="$out_dir/objects/${variant}/selected-object.o"
            mkdir -p "$(dirname "$output")"
            local args=()
            local section
            for section in "$@"; do
              args+=(--remove-section="$section")
            done
            if [ "${#args[@]}" -eq 0 ]; then
              cp "$selected_obj" "$output" > "$out_dir/objects/${variant}/transform.log" 2>&1
            elif [ -n "${objcopy_tool}" ]; then
              "$objcopy_tool" "${args[@]}" "$selected_obj" "$output" > "$out_dir/objects/${variant}/transform.log" 2>&1
            else
              echo "llvm-objcopy not found via xcrun, PATH, /opt/homebrew/opt/llvm, or /usr/local/opt/llvm" > "$out_dir/objects/${variant}/transform.log"
              printf '%s\n' 127
              return 0
            fi
            printf '%s\n' "$?"
          }

          link_with_ld() {
            local object_variant="$1"
            local object_path="$2"
            local link_variant="$3"
            local use_classic="$4"
            local link_dir="$out_dir/${object_variant}/${link_variant}"
            local bin="$link_dir/test.${object_variant}.${link_variant}"
            local map="$link_dir/test.${object_variant}.${link_variant}.map"
            mkdir -p "$link_dir"
            local args=(
              -demangle
              -dynamic
              -arch arm64
              -platform_version macos 14.0.0 14.0
              -syslibroot "$sdkroot"
              -o "$bin"
              -L "$target_root/deps"
              -L "$rustlib"
              -L /usr/local/lib
              "$object_path"
              "$compiler_builtins"
              -liconv
              -lSystem
              -lc
              -lm
              -dead_strip
              -map "$map"
            )
            if [ "$use_classic" = "yes" ]; then
              args+=(-ld_classic)
            fi
            {
              printf 'DEVELOPER_DIR=%q xcrun ld' "$developer_dir"
              printf ' %q' "${args[@]}"
              echo
            } > "$link_dir/ld-command.txt"
            DEVELOPER_DIR="${developer_dir}" xcrun ld "${args[@]}" > "$link_dir/link.log" 2>&1
            printf '%s\n' "$?" > "$link_dir/status.txt"
            echo "$bin"
          }

          record_variant() {
            local object_variant="$1"
            local remove_desc="$2"
            local transform_status="$3"
            local object_path="$4"
            local link_variant="$5"
            local bin="$6"
            local link_status="$7"
            local meta_dir="$out_dir/objects/${object_variant}"
            local link_dir="$out_dir/${object_variant}/${link_variant}"
            local object_line final_line final_sha object_sha dwarf_sections text_relocs debug_info_relocs compact_unwind_relocs eh_frame_relocs
            local object_expected_count object_corrupt_count final_expected_count final_corrupt_count object_line_tsv final_line_tsv
            object_line="$(cat "$meta_dir/object.target-line.txt" 2>/dev/null || echo missing)"
            object_sha="$(shasum -a 256 "$object_path" | awk '{print $1}')"
            dwarf_sections="$(grep -c '__DWARF' "$meta_dir/otool-load-commands.txt" || true)"
            text_relocs="$(count_relocs "$meta_dir/objdump-relocs.txt" "__TEXT,__text")"
            debug_info_relocs="$(count_relocs "$meta_dir/objdump-relocs.txt" "__DWARF,__debug_info")"
            compact_unwind_relocs="$(count_relocs "$meta_dir/objdump-relocs.txt" "__LD,__compact_unwind")"
            eh_frame_relocs="$(count_relocs "$meta_dir/objdump-relocs.txt" "__TEXT,__eh_frame")"
            object_expected_count="$(count_bytes "$object_path" "$expected_bytes")"
            object_corrupt_count="$(count_bytes "$object_path" "$corrupt_bytes")"
            final_line="missing"
            final_sha="NA"
            final_expected_count="NA"
            final_corrupt_count="NA"
            if [ "$link_status" -eq 0 ]; then
              final_sha="$(shasum -a 256 "$bin" | awk '{print $1}')"
              target_line "final-${object_variant}-${link_variant}" "$bin" "$link_dir/final.target-line.txt"
              final_line="$(cat "$link_dir/final.target-line.txt")"
              final_expected_count="$(count_bytes "$bin" "$expected_bytes")"
              final_corrupt_count="$(count_bytes "$bin" "$corrupt_bytes")"
            fi
            object_line_tsv="${object_line//$'\t'/ }"
            final_line_tsv="${final_line//$'\t'/ }"
            {
              echo "## ${object_variant} / ${link_variant}"
              echo
              echo "- remove_sections: \`${remove_desc:-none}\`"
              echo "- transform_status: \`${transform_status}\`"
              echo "- link_status: \`${link_status}\`"
              echo "- object target: \`${object_line}\`"
              echo "- final target: \`${final_line}\`"
              echo "- dwarf_sections: \`${dwarf_sections}\`"
              echo "- text_relocs: \`${text_relocs}\`"
              echo "- debug_info_relocs: \`${debug_info_relocs}\`"
              echo "- compact_unwind_relocs: \`${compact_unwind_relocs}\`"
              echo "- eh_frame_relocs: \`${eh_frame_relocs}\`"
              echo "- object expected byte count: \`${object_expected_count}\`"
              echo "- object corrupt byte count: \`${object_corrupt_count}\`"
              echo "- final expected byte count: \`${final_expected_count}\`"
              echo "- final corrupt byte count: \`${final_corrupt_count}\`"
              echo
              echo "### transform log"
              echo
              echo "\`\`\`text"
              cat "$meta_dir/transform.log" 2>/dev/null || true
              echo "\`\`\`"
              echo
              echo "### link log"
              echo
              echo "\`\`\`text"
              cat "$link_dir/link.log" 2>/dev/null || true
              echo "\`\`\`"
              echo
            } >> "$summary"
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$label" "$object_variant" "${remove_desc:-none}" "$transform_status" "$link_variant" "$link_status" \
              "$object_line_tsv" "$final_line_tsv" "$object_sha" "$final_sha" "$dwarf_sections" \
              "$text_relocs" "$debug_info_relocs" "$compact_unwind_relocs" "$eh_frame_relocs" \
              "$object_expected_count" "$object_corrupt_count" "$final_expected_count" "$final_corrupt_count" >> "$rows"
          }

          make_and_link_variant() {
            local object_variant="$1"
            local remove_desc="$2"
            local transform_status="$3"
            local object_path="$out_dir/objects/${object_variant}/selected-object.o"
            if [ "$transform_status" -ne 0 ] || [ ! -f "$object_path" ]; then
              {
                echo "## ${object_variant}"
                echo
                echo "- remove_sections: \`${remove_desc:-none}\`"
                echo "- transform_status: \`${transform_status}\`"
                echo
                echo "\`\`\`text"
                cat "$out_dir/objects/${object_variant}/transform.log" 2>/dev/null || true
                echo "\`\`\`"
                echo
              } >> "$summary"
              printf '%s\t%s\t%s\t%s\tNA\tNA\tmissing\tmissing\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\n' \
                "$label" "$object_variant" "${remove_desc:-none}" "$transform_status" >> "$rows"
              return 0
            fi
            dump_object_metadata "$object_variant" "$object_path"
            for link_variant in ld_new_no_lto ld_classic_no_lto; do
              if [ "$link_variant" = "ld_classic_no_lto" ]; then
                bin="$(link_with_ld "$object_variant" "$object_path" "$link_variant" yes)"
              else
                bin="$(link_with_ld "$object_variant" "$object_path" "$link_variant" no)"
              fi
              link_status="$(cat "$out_dir/${object_variant}/${link_variant}/status.txt")"
              record_variant "$object_variant" "$remove_desc" "$transform_status" "$object_path" "$link_variant" "$bin" "$link_status"
            done
          }

          if [ ! -d "${developer_dir}" ]; then
            printf '%s\tmissing_xcode\tNA\tNA\tNA\tNA\tmissing\tmissing\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\n' "$label" >> "$rows"
            cat "$summary"
            exit 0
          fi

          rustlib="$(rustc +1.78.0 --print target-libdir)"
          compiler_builtins="$(ls "$rustlib"/libcompiler_builtins-*.rlib | head -n 1)"
          sdkroot="$(DEVELOPER_DIR="${developer_dir}" xcrun --show-sdk-path)"
          build_rustflags="-C save-temps ${target_feature_flags}"
          objcopy_tool=""
          if DEVELOPER_DIR="${developer_dir}" xcrun --find llvm-objcopy > "$out_dir/xcrun-llvm-objcopy-path.txt" 2>/dev/null; then
            objcopy_tool="$(cat "$out_dir/xcrun-llvm-objcopy-path.txt")"
          elif command -v llvm-objcopy > "$out_dir/path-llvm-objcopy-path.txt" 2>/dev/null; then
            objcopy_tool="$(cat "$out_dir/path-llvm-objcopy-path.txt")"
          elif [ -x /opt/homebrew/opt/llvm/bin/llvm-objcopy ]; then
            objcopy_tool="/opt/homebrew/opt/llvm/bin/llvm-objcopy"
          elif [ -x /usr/local/opt/llvm/bin/llvm-objcopy ]; then
            objcopy_tool="/usr/local/opt/llvm/bin/llvm-objcopy"
          else
            rust_host="$(rustc +1.78.0 -vV | awk '/^host:/ { print $2 }')"
            rust_objcopy="$(rustc +1.78.0 --print sysroot)/lib/rustlib/${rust_host}/bin/llvm-objcopy"
            if [ -x "$rust_objcopy" ]; then
              objcopy_tool="$rust_objcopy"
            fi
          fi

          DEVELOPER_DIR="${developer_dir}" RUSTFLAGS="${build_rustflags}" \
            cargo +1.78.0 test ${cargo_args} \
            > "$out_dir/build.log" 2>&1
          build_status=$?
          selected_obj="$(find_target_object || true)"

          {
            echo "## Build"
            echo
            echo "- RUSTFLAGS: \`${build_rustflags}\`"
            echo "- cargo args: \`${cargo_args}\`"
            echo "- build_status: \`${build_status}\`"
            echo "- selected_obj: \`${selected_obj:-missing}\`"
            echo "- compiler_builtins: \`${compiler_builtins:-missing}\`"
            echo "- sdkroot: \`${sdkroot:-missing}\`"
            echo "- objcopy_tool: \`${objcopy_tool:-missing}\`"
            echo
            echo "## Build log tail"
            echo
            echo "\`\`\`text"
            tail -n 120 "$out_dir/build.log" || true
            echo "\`\`\`"
            echo
          } >> "$summary"

          if [ "$build_status" -ne 0 ] || [ -z "$selected_obj" ] || [ -z "$compiler_builtins" ]; then
            printf '%s\tbuild_or_lookup_failed\tNA\tNA\tNA\tNA\tmissing\tmissing\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\tNA\n' "$label" >> "$rows"
            cat "$summary"
            exit 0
          fi

          status="$(remove_sections original)"
          make_and_link_variant original none "$status"

          status="$(remove_sections remove_compact "__LD,__compact_unwind")"
          make_and_link_variant remove_compact "__LD,__compact_unwind" "$status"

          status="$(remove_sections remove_eh_frame "__TEXT,__eh_frame")"
          make_and_link_variant remove_eh_frame "__TEXT,__eh_frame" "$status"

          status="$(remove_sections remove_compact_and_eh "__LD,__compact_unwind" "__TEXT,__eh_frame")"
          make_and_link_variant remove_compact_and_eh "__LD,__compact_unwind __TEXT,__eh_frame" "$status"

          cat "$summary"
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-remove-unwind-sections-direct-ld-${{ matrix.probe.artifact_suffix }}
          path: neon-rej-diagnostics/**
