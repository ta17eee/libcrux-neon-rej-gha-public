name: NEON rejection sampler public Xcode PR287 re-enable instrumented KAT

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/neon_rej_public_xcode_pr287_reenable_instrumented_kat.yml

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  pr287-reenable-instrumented-kat:
    name: ${{ matrix.case.label }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        case:
          - label: pr287 reenabled instrumented ordinary
            target_feature_flags: ""
          - label: pr287 reenabled instrumented plus-neon
            target_feature_flags: "-C target_feature=+neon"

    steps:
      - name: Checkout public upstream libcrux at PR287 fallback commit
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: 76ab582c79998d5ef77e6e6b6d287c6b1ff0106d
          path: libcrux

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        working-directory: libcrux
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Re-enable and instrument NEON rejection sampler
        working-directory: libcrux
        run: |
          perl -0pi -e 's#// mod rejsample;#mod rejsample;#' polynomials-aarch64/src/lib.rs
          perl -0pi -e 's#rej_sample\(a, out\)#rejsample::rej_sample(a, out)#' polynomials-aarch64/src/lib.rs
          python3 - <<'PY'
          from pathlib import Path

          path = Path("polynomials-aarch64/src/rejsample.rs")
          text = path.read_text()
          old = """    let masked = _vandq_u16(mask0, bits);
    let used0 = _vaddvq_u16(masked);
    let masked = _vandq_u16(mask1, bits);
    let used1 = _vaddvq_u16(masked);
    let pick0 = used0.count_ones();
    let pick1 = used1.count_ones();

    // XXX: the indices used0 and used1 must be < 256.
    let index_vec0 = _vld1q_u8(&IDX_TABLE[(used0 as u8) as usize]);
    let shifted0 = _vreinterpretq_s16_u8(_vqtbl1q_u8(_vreinterpretq_u8_s16(input.low), index_vec0));
    let index_vec1 = _vld1q_u8(&IDX_TABLE[(used1 as u8) as usize]);
    let shifted1 =
        _vreinterpretq_s16_u8(_vqtbl1q_u8(_vreinterpretq_u8_s16(input.high), index_vec1));

    let idx0 = usize::try_from(pick0).unwrap();
    _vst1q_s16(&mut out[0..8], shifted0);
    _vst1q_s16(&mut out[idx0..idx0 + 8], shifted1);
"""
          new = """    let masked0 = _vandq_u16(mask0, bits);
    let used0 = _vaddvq_u16(masked0);
    let masked1 = _vandq_u16(mask1, bits);
    let used1 = _vaddvq_u16(masked1);
    let pick0 = used0.count_ones();
    let pick1 = used1.count_ones();

    // XXX: the indices used0 and used1 must be < 256.
    let index_vec0 = _vld1q_u8(&IDX_TABLE[(used0 as u8) as usize]);
    let shifted0 = _vreinterpretq_s16_u8(_vqtbl1q_u8(_vreinterpretq_u8_s16(input.low), index_vec0));
    let index_vec1 = _vld1q_u8(&IDX_TABLE[(used1 as u8) as usize]);
    let shifted1 =
        _vreinterpretq_s16_u8(_vqtbl1q_u8(_vreinterpretq_u8_s16(input.high), index_vec1));

    let idx0 = usize::try_from(pick0).unwrap();
    if pick0 > 8 || pick1 > 8 || idx0 + 8 > out.len() {
        let mut input_low_lanes = [0i16; 8];
        let mut input_high_lanes = [0i16; 8];
        let mut mask0_lanes = [0u16; 8];
        let mut mask1_lanes = [0u16; 8];
        let mut masked0_lanes = [0u16; 8];
        let mut masked1_lanes = [0u16; 8];
        _vst1q_s16(&mut input_low_lanes, input.low);
        _vst1q_s16(&mut input_high_lanes, input.high);
        _vst1q_u16(&mut mask0_lanes, mask0);
        _vst1q_u16(&mut mask1_lanes, mask1);
        _vst1q_u16(&mut masked0_lanes, masked0);
        _vst1q_u16(&mut masked1_lanes, masked1);
        panic!(
            "NEON_REJ_DEBUG used0=0x{:04x} used0_u8=0x{:02x} used1=0x{:04x} used1_u8=0x{:02x} pick0={} pick1={} idx0={} out_len={} a={:?} input_low={:?} input_high={:?} mask0={:?} mask1={:?} masked0={:?} masked1={:?}",
            used0,
            used0 as u8,
            used1,
            used1 as u8,
            pick0,
            pick1,
            idx0,
            out.len(),
            a,
            input_low_lanes,
            input_high_lanes,
            mask0_lanes,
            mask1_lanes,
            masked0_lanes,
            masked1_lanes
        );
    }
    _vst1q_s16(&mut out[0..8], shifted0);
    _vst1q_s16(&mut out[idx0..idx0 + 8], shifted1);
"""
          if old not in text:
              raise SystemExit("expected rej_sample block not found")
          path.write_text(text.replace(old, new))
          PY
          git diff -- polynomials-aarch64/src/lib.rs polynomials-aarch64/src/rejsample.rs

      - name: Install historical toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Run ML-KEM NIST KATs
        working-directory: libcrux
        env:
          DEVELOPER_DIR: /Applications/Xcode_15.0.1.app/Contents/Developer
          RUST_BACKTRACE: "1"
          RUSTFLAGS: -C save-temps ${{ matrix.case.target_feature_flags }}
        run: |
          set -o pipefail
          mkdir -p neon-rej-diagnostics/pr287-reenable-instrumented-kat
          {
            echo "label=${{ matrix.case.label }}"
            echo "target_feature_flags=${{ matrix.case.target_feature_flags }}"
            sw_vers
            uname -a
            xcodebuild -version
            xcrun --find ld
            xcrun --show-sdk-path
            ld -v || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
          } | tee neon-rej-diagnostics/pr287-reenable-instrumented-kat/toolchain.log
          cargo +1.78.0 test \
            --manifest-path libcrux-ml-kem/Cargo.toml \
            --release \
            --test nistkats \
            -- --nocapture \
            2>&1 | tee neon-rej-diagnostics/pr287-reenable-instrumented-kat/test.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-pr287-reenable-instrumented-kat-${{ matrix.case.label }}
          path: libcrux/neon-rej-diagnostics/**
