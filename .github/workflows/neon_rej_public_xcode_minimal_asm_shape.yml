name: NEON rejection sampler public Xcode minimal asm shape

"on":
  workflow_dispatch:

jobs:
  minimal-asm-shape:
    name: minimal asm relocation shape
    runs-on: macos-14

    steps:
      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Build and link minimal assembly shapes
        run: |
          set +e
          developer_dir="/Applications/Xcode_15.0.1.app/Contents/Developer"
          out_dir="$PWD/neon-rej-diagnostics/minimal-asm-shape"
          mkdir -p "$out_dir"
          summary="$out_dir/summary.md"
          rows="$out_dir/summary.rows.tsv"

          {
            echo "# Minimal assembly relocation-shape probe"
            echo
            echo "Developer dir: \`${developer_dir}\`"
            echo
            echo "## Runner and toolchain"
            echo
            echo "\`\`\`text"
            sw_vers
            uname -a
            sysctl hw.optional.AdvSIMD || true
            DEVELOPER_DIR="${developer_dir}" xcodebuild -version || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find clang || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find cc || true
            DEVELOPER_DIR="${developer_dir}" xcrun --find ld || true
            DEVELOPER_DIR="${developer_dir}" xcrun --show-sdk-path || true
            DEVELOPER_DIR="${developer_dir}" ld -v || true
            DEVELOPER_DIR="${developer_dir}" ld -version_details || true
            echo "\`\`\`"
            echo
          } > "$summary" 2>&1

          printf 'case\tvariant\tlink_status\trun_status\tobject_line\tfinal_line\tobject_sha256\tfinal_sha256\tlinker\tlto_arg\tclassic\n' > "$rows"

          if [ ! -d "${developer_dir}" ]; then
            printf 'all\tmissing_xcode\tNA\tNA\tmissing\tmissing\tNA\tNA\tNA\tNA\tNA\n' >> "$rows"
            cat "$summary"
            exit 0
          fi

          sdkroot="$(DEVELOPER_DIR="${developer_dir}" xcrun --show-sdk-path)"
          lto_library="${developer_dir}/Toolchains/XcodeDefault.xctoolchain/usr/lib/libLTO.dylib"
          asm="$out_dir/minimal_shape.s"
          obj="$out_dir/minimal_shape.o"

          cat > "$asm" <<'ASM'
          .text
          .p2align 2
          .globl _main
          .private_extern _main
          _main:
          mov w0, #0
          ret

          .p2align 2
          .globl _SIMD128Vector_rej_sample
          _SIMD128Vector_rej_sample:
          ret

          .p2align 2
          .globl _case_b9fa
          _case_b9fa:
          .rept 458
          nop
          .endr
          L_b9fa_back:
          nop
          .rept 882
          nop
          .endr
          bl _SIMD128Vector_rej_sample
          .rept 2
          nop
          .endr
          adrp x5, L_b9fa_const@PAGE
          add x5, x5, L_b9fa_const@PAGEOFF
          .rept 3
          nop
          .endr
          b L_b9fa_back
          ret

          .p2align 2
          .globl _case_0c67
          _case_0c67:
          .rept 2876
          nop
          .endr
          bl _SIMD128Vector_rej_sample
          .rept 6
          nop
          .endr
          adrp x5, L_0c67_const2@PAGE
          add x5, x5, L_0c67_const2@PAGEOFF
          adrp x5, L_0c67_const1@PAGE
          add x5, x5, L_0c67_const1@PAGEOFF
          .rept 8
          nop
          .endr
          mov x28, x3
          ret

          .section __TEXT,__const
          .p2align 3
          L_b9fa_const:
          .quad 0x1122334455667788
          L_0c67_const1:
          .quad 0x99aabbccddeeff00
          L_0c67_const2:
          .quad 0x0123456789abcdef
          ASM

          DEVELOPER_DIR="${developer_dir}" xcrun clang -arch arm64 -c "$asm" -o "$obj" > "$out_dir/assemble.log" 2>&1
          assemble_status=$?
          object_sha="NA"
          if [ "$assemble_status" -eq 0 ]; then
            object_sha="$(shasum -a 256 "$obj" | awk '{print $1}')"
          fi

          add_hex() {
            python3 - "$1" "$2" <<'PY'
          import sys
          print(f"{int(sys.argv[1], 16) + int(sys.argv[2], 16):x}")
          PY
          }

          run_with_timeout() {
            local seconds="$1"
            shift
            python3 - "$seconds" "$@" <<'PY'
          import os, signal, subprocess, sys, time
          seconds = int(sys.argv[1])
          argv = sys.argv[2:]
          proc = subprocess.Popen(argv, preexec_fn=os.setsid)
          deadline = time.time() + seconds
          while True:
              status = proc.poll()
              if status is not None:
                  raise SystemExit(status)
              if time.time() >= deadline:
                  print(f"timeout after {seconds}s; terminating pid {proc.pid}", flush=True)
                  os.killpg(proc.pid, signal.SIGTERM)
                  time.sleep(5)
                  if proc.poll() is None:
                      os.killpg(proc.pid, signal.SIGKILL)
                  raise SystemExit(124)
              time.sleep(1)
          PY
          }

          target_line() {
            local kind="$1"
            local path="$2"
            local symbol="$3"
            local offset="$4"
            local out_file="$5"
            local dis_file="$out_file.disassembly.txt"
            local nm_file="$out_file.nm.txt"
            local symbol_addr target_addr
            nm -nm "$path" > "$nm_file" 2>&1
            symbol_addr="$(awk -v s="$symbol" '$0 ~ s { print $1; exit }' "$nm_file")"
            if ! printf '%s' "$symbol_addr" | grep -Eq '^[0-9a-fA-F]+$'; then
              echo "missing" > "$out_file"
              return 0
            fi
            target_addr="$(add_hex "0x${symbol_addr}" "$offset")"
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump \
              --macho --arch=arm64 --disassemble "$path" > "$dis_file" 2>&1
            python3 - "$dis_file" "$target_addr" "$out_file" <<'PY'
          import re, sys
          path, target_s, out = sys.argv[1:]
          target = int(target_s, 16)
          lines = open(path, errors="replace").read().splitlines()
          found = "missing"
          for i, line in enumerate(lines):
              m = re.match(r"\s*([0-9a-fA-F]+):\s*(.*)", line)
              if m and int(m.group(1), 16) == target:
                  found = line.strip()
                  lo = max(0, i - 10)
                  hi = min(len(lines), i + 11)
                  with open(out + ".window", "w") as f:
                      for w in lines[lo:hi]:
                          f.write(w + "\n")
                  break
          open(out, "w").write(found + "\n")
          PY
          }

          record_relocs() {
            local kind="$1"
            local path="$2"
            DEVELOPER_DIR="${developer_dir}" xcrun llvm-objdump --macho --arch=arm64 --reloc "$path" > "$out_dir/${kind}.relocs.txt" 2>&1 || true
            otool -r "$path" > "$out_dir/${kind}.otool-relocs.txt" 2>&1 || true
          }

          link_with_cc() {
            local label="$1"
            local extra="$2"
            local link_dir="$out_dir/${label}"
            local bin="$link_dir/minimal_shape.${label}"
            local map="$link_dir/minimal_shape.${label}.map"
            mkdir -p "$link_dir"
            local args=(
              -arch arm64
              -nodefaultlibs
              -o "$bin"
              "$obj"
              -lSystem
              -lc
              -Wl,-u,_case_b9fa
              -Wl,-u,_case_0c67
              -Wl,-dead_strip
              -Wl,-map,"$map"
            )
            if [ -n "$extra" ]; then
              read -r -a parsed_extra <<< "$extra"
              args+=("${parsed_extra[@]}")
            fi
            DEVELOPER_DIR="${developer_dir}" xcrun cc -### "${args[@]}" > "$link_dir/cc-dash.log" 2>&1 || true
            DEVELOPER_DIR="${developer_dir}" xcrun cc "${args[@]}" > "$link_dir/link.log" 2>&1
            printf '%s\n' "$?" > "$link_dir/status.txt"
            echo "$bin"
          }

          link_with_ld() {
            local label="$1"
            local use_lto="$2"
            local use_classic="$3"
            local link_dir="$out_dir/${label}"
            local bin="$link_dir/minimal_shape.${label}"
            local map="$link_dir/minimal_shape.${label}.map"
            mkdir -p "$link_dir"
            local args=(
              -demangle
              -dynamic
              -arch arm64
              -platform_version macos 14.0.0 14.0
              -syslibroot "$sdkroot"
              -o "$bin"
              "$obj"
              -lSystem
              -lc
              -u _case_b9fa
              -u _case_0c67
              -dead_strip
              -map "$map"
            )
            if [ "$use_lto" = "yes" ]; then
              args=(-lto_library "$lto_library" "${args[@]}")
            fi
            if [ "$use_classic" = "yes" ]; then
              args+=(-ld_classic)
            fi
            {
              printf 'DEVELOPER_DIR=%q xcrun ld' "$developer_dir"
              printf ' %q' "${args[@]}"
              echo
            } > "$link_dir/ld-command.txt"
            DEVELOPER_DIR="${developer_dir}" xcrun ld "${args[@]}" > "$link_dir/link.log" 2>&1
            printf '%s\n' "$?" > "$link_dir/status.txt"
            echo "$bin"
          }

          object_b9fa="missing"
          object_0c67="missing"
          if [ "$assemble_status" -eq 0 ]; then
            target_line object "$obj" "_case_b9fa" "0x1514" "$out_dir/object.b9fa.target-line.txt"
            object_b9fa="$(cat "$out_dir/object.b9fa.target-line.txt")"
            target_line object "$obj" "_case_0c67" "0x2d3c" "$out_dir/object.0c67.target-line.txt"
            object_0c67="$(cat "$out_dir/object.0c67.target-line.txt")"
            record_relocs object "$obj"
          fi

          {
            echo "## Assembly"
            echo
            echo "- assemble_status: \`${assemble_status}\`"
            echo "- object_sha256: \`${object_sha}\`"
            echo "- b9fa object target: \`${object_b9fa}\`"
            echo "- 0c67 object target: \`${object_0c67}\`"
            echo
            echo "### Source"
            echo
            echo "\`\`\`asm"
            sed -n '1,220p' "$asm"
            echo "\`\`\`"
            echo
            echo "### Object relocations"
            echo
            echo "\`\`\`text"
            cat "$out_dir/object.relocs.txt" 2>/dev/null || true
            echo "\`\`\`"
            echo
            echo "### Assemble log"
            echo
            echo "\`\`\`text"
            cat "$out_dir/assemble.log" 2>/dev/null || true
            echo "\`\`\`"
            echo
          } >> "$summary"

          if [ "$assemble_status" -ne 0 ]; then
            cat "$summary"
            exit 0
          fi

          record_variant() {
            local label="$1"
            local bin="$2"
            local status="$3"
            local linker="$4"
            local lto_arg="$5"
            local classic="$6"
            local link_dir="$out_dir/${label}"
            local run_status="NA"
            local final_sha="NA"
            local final_b9fa="missing"
            local final_0c67="missing"
            if [ "$status" -eq 0 ]; then
              final_sha="$(shasum -a 256 "$bin" | awk '{print $1}')"
              target_line "${label}-b9fa-final" "$bin" "_case_b9fa" "0x1514" "$link_dir/final.b9fa.target-line.txt"
              final_b9fa="$(cat "$link_dir/final.b9fa.target-line.txt")"
              target_line "${label}-0c67-final" "$bin" "_case_0c67" "0x2d3c" "$link_dir/final.0c67.target-line.txt"
              final_0c67="$(cat "$link_dir/final.0c67.target-line.txt")"
              record_relocs "${label}.final" "$bin"
              run_with_timeout 20 "$bin" > "$link_dir/run.log" 2>&1
              run_status=$?
            fi
            {
              echo "## Variant: ${label}"
              echo
              echo "- linker: \`${linker}\`"
              echo "- lto_arg: \`${lto_arg}\`"
              echo "- classic: \`${classic}\`"
              echo "- link_status: \`${status}\`"
              echo "- run_status: \`${run_status}\`"
              echo "- final_sha256: \`${final_sha}\`"
              echo "- b9fa final target: \`${final_b9fa}\`"
              echo "- 0c67 final target: \`${final_0c67}\`"
              echo
              echo "### final b9fa target window"
              echo
              echo "\`\`\`text"
              cat "$link_dir/final.b9fa.target-line.txt.window" 2>/dev/null || true
              echo "\`\`\`"
              echo
              echo "### final 0c67 target window"
              echo
              echo "\`\`\`text"
              cat "$link_dir/final.0c67.target-line.txt.window" 2>/dev/null || true
              echo "\`\`\`"
              echo
              echo "### link command"
              echo
              echo "\`\`\`text"
              cat "$link_dir/ld-command.txt" "$link_dir/cc-dash.log" 2>/dev/null || true
              echo "\`\`\`"
              echo
              echo "### link log"
              echo
              echo "\`\`\`text"
              cat "$link_dir/link.log" 2>/dev/null || true
              echo "\`\`\`"
              echo
            } >> "$summary"
            printf 'b9fa\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$label" "$status" "$run_status" "$object_b9fa" "$final_b9fa" \
              "$object_sha" "$final_sha" "$linker" "$lto_arg" "$classic" >> "$rows"
            printf '0c67\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$label" "$status" "$run_status" "$object_0c67" "$final_0c67" \
              "$object_sha" "$final_sha" "$linker" "$lto_arg" "$classic" >> "$rows"
          }

          cc_bin="$(link_with_cc cc_new_final "")"
          cc_status="$(cat "$out_dir/cc_new_final/status.txt")"
          record_variant cc_new_final "$cc_bin" "$cc_status" cc yes no

          cc_classic_bin="$(link_with_cc cc_classic_final "-Wl,-ld_classic")"
          cc_classic_status="$(cat "$out_dir/cc_classic_final/status.txt")"
          record_variant cc_classic_final "$cc_classic_bin" "$cc_classic_status" cc yes yes

          ld_lto_bin="$(link_with_ld ld_new_with_lto yes no)"
          ld_lto_status="$(cat "$out_dir/ld_new_with_lto/status.txt")"
          record_variant ld_new_with_lto "$ld_lto_bin" "$ld_lto_status" ld yes no

          ld_no_lto_bin="$(link_with_ld ld_new_no_lto no no)"
          ld_no_lto_status="$(cat "$out_dir/ld_new_no_lto/status.txt")"
          record_variant ld_new_no_lto "$ld_no_lto_bin" "$ld_no_lto_status" ld no no

          ld_classic_lto_bin="$(link_with_ld ld_classic_with_lto yes yes)"
          ld_classic_lto_status="$(cat "$out_dir/ld_classic_with_lto/status.txt")"
          record_variant ld_classic_with_lto "$ld_classic_lto_bin" "$ld_classic_lto_status" ld yes yes

          cat "$summary"
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-minimal-asm-shape
          path: neon-rej-diagnostics/**
