name: NEON rejection sampler public Xcode PR287 scalar guard relocation address

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/neon_rej_public_xcode_pr287_scalar_guard_reloc_address.yml
      - .github/scripts/patch_macho_reloc_addresses.py
      - .github/scripts/dump_pr287_reloc_context.py
      - .github/scripts/scan_pr287_bad_word.py
      - .github/scripts/patch_pr287_rejsample_scalar_guard.py

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  pr287-scalar-guard-reloc-address:
    name: pr287 scalar-guard relocation address
    runs-on: macos-14

    steps:
      - name: Checkout probe repository
        uses: actions/checkout@v4
        with:
          path: harness

      - name: Checkout public upstream libcrux at PR287 fallback commit
        uses: actions/checkout@v4
        with:
          repository: cryspen/libcrux
          ref: 76ab582c79998d5ef77e6e6b6d287c6b1ff0106d
          path: libcrux

      - name: Assert Apple Silicon runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          echo "RUNNER_ARCH: ${RUNNER_ARCH:-unset}"
          test "${arch}" = "arm64"

      - name: Patch old hax dependency pins
        working-directory: libcrux
        run: |
          retry() {
            local attempt status
            for attempt in 1 2 3; do
              "$@" && return 0
              status=$?
              echo "attempt ${attempt} failed with status ${status}: $*"
              sleep $((attempt * 10))
            done
            return "${status}"
          }

          find . -name Cargo.toml -print0 \
            | xargs -0 perl -0pi -e 's/branch = "main"/rev = "3885c006197a86466f9928d4c619a435617ee0a8"/g if /github\.com\/hacspec\/hax/'
          retry cargo update -p clap --precise 4.5.4
          retry cargo update -p half --precise 2.4.1
          retry cargo update -p rayon --precise 1.10.0
          retry cargo update -p rayon-core --precise 1.12.1
          retry cargo update -p quickcheck --precise 1.0.3
          retry cargo update -p quickcheck_macros --precise 1.0.0

      - name: Re-enable NEON rejection sampler with scalar guard
        working-directory: libcrux
        run: |
          perl -0pi -e 's#// mod rejsample;#mod rejsample;#' polynomials-aarch64/src/lib.rs
          perl -0pi -e 's#rej_sample\(a, out\)#rejsample::rej_sample(a, out)#' polynomials-aarch64/src/lib.rs
          python3 ../harness/.github/scripts/patch_pr287_rejsample_scalar_guard.py
          git diff -- polynomials-aarch64/src/lib.rs polynomials-aarch64/src/rejsample.rs

      - name: Install historical toolchain
        run: |
          rustup toolchain install 1.78.0

      - name: Build and sweep relocation address variants
        working-directory: libcrux
        env:
          DEVELOPER_DIR: /Applications/Xcode_15.0.1.app/Contents/Developer
          RUSTFLAGS: -C save-temps -C debuginfo=2
        run: |
          set -o pipefail
          diag="neon-rej-diagnostics/pr287-scalar-guard-reloc-address"
          pattern_words="0xce162400 0x6e3b1fa2 0xce1b3ba3 0xce0e2842 0xce0a2063 0x6e2b1ea4 0xce0b36a5 0xce0d3c84 0x4e803241 0xce0f40b2 0xce1c1b25 0x4eb11e3c 0x4eb61ed1 0x3dc1efe7 0xce1a1cb8 0xce88fc42"
          mkdir -p "${diag}/variants"
          {
            echo "label=pr287 scalar-guard relocation address"
            echo "developer_dir=${DEVELOPER_DIR}"
            sw_vers
            uname -a
            xcodebuild -version
            xcrun --find cc
            xcrun --find ld
            xcrun --show-sdk-path
            ld -v || true
            rustc +1.78.0 --version
            cargo +1.78.0 --version
          } | tee "${diag}/toolchain.log"

          cargo +1.78.0 test \
            --manifest-path libcrux-ml-kem/Cargo.toml \
            --release \
            --test nistkats \
            --no-run \
            2>&1 | tee "${diag}/build.log"

          bin="$(pwd)/$(find target/release/deps -maxdepth 1 -type f -perm +111 -name 'nistkats-*' | head -n 1)"
          test -x "${bin}"
          python3 ../harness/.github/scripts/scan_pr287_bad_word.py \
            --root target/release/deps \
            --bin "${bin}" \
            --pattern-words "${pattern_words}" \
            --bad-word 0x4e803241 \
            --bad-index 8 \
            --out "${diag}/cargo-final-scan.json" \
            2>&1 | tee "${diag}/cargo-final-scan.log"

          selected_obj="$(
            python3 -c 'import json; d=json.load(open("'"${diag}/cargo-final-scan.json"'")); print(next(e["path"] for e in d["interesting_files"] if "Mach-O 64-bit object" in e["kind"] and e["wildcard_context_match_count"]))'
          )"
          test -f "${selected_obj}"
          rustlib="$(rustc +1.78.0 --print target-libdir)"
          compiler_builtins="$(ls "${rustlib}"/libcompiler_builtins-*.rlib | head -n 1)"
          test -f "${compiler_builtins}"
          {
            echo "selected_obj=${selected_obj}"
            file "${selected_obj}" || true
            shasum -a 256 "${selected_obj}" || true
            echo "rustlib=${rustlib}"
            echo "compiler_builtins=${compiler_builtins}"
          } | tee "${diag}/selected-object.log"

          python3 ../harness/.github/scripts/dump_pr287_reloc_context.py \
            --object "${selected_obj}" \
            --scan-json "${diag}/cargo-final-scan.json" \
            --out-json "${diag}/reloc-context.json" \
            --out-md "${diag}/reloc-context.md"

          pair_info="$(
            python3 -c 'import json,re; d=json.load(open("'"${diag}/reloc-context.json"'")); pairs=[p for p in d["candidate_page21_pageoff_pairs"] if re.fullmatch(r"lCPI[0-9]+_2", p["symbol"]) and p["matched_base_reg"]]; pairs.sort(key=lambda p: (abs(p["page21_delta"])+abs(p["pageoff_delta"]), abs(p["pageoff_delta"]))); p=pairs[0]; print("{} {} {} {} {} {}".format(p["page21_index"], p["pageoff_index"], int(p["page21_addr"],16), int(p["pageoff_addr"],16), int(d["victim_section_addr"],16), p["symbol"]))'
          )"
          set -- ${pair_info}
          pair_page21_index="$1"
          pair_pageoff_index="$2"
          pair_page21_addr="$3"
          pair_pageoff_addr="$4"
          victim_addr="$5"
          pair_symbol="$6"
          {
            echo "pair_page21_index=${pair_page21_index}"
            echo "pair_pageoff_index=${pair_pageoff_index}"
            printf 'pair_page21_addr=0x%x\n' "${pair_page21_addr}"
            printf 'pair_pageoff_addr=0x%x\n' "${pair_pageoff_addr}"
            printf 'victim_addr=0x%x\n' "${victim_addr}"
            echo "pair_symbol=${pair_symbol}"
          } | tee "${diag}/selected-pair.log"

          extra_addresses="$(
            python3 -c 'import json; d=json.load(open("'"${diag}/reloc-context.json"'")); victim=int(d["victim_section_addr"],16); pair_symbol="'"${pair_symbol}"'"; rels=d["near_relocations"]; addr=lambda r:int(str(r["address"]),16); page21=[r for r in rels if r["type_name"]=="PAGE21" and addr(r)<victim and r["index"] != int("'"${pair_page21_index}"'")]; page21.sort(key=lambda r: abs(victim-addr(r))); pageoff=[r for r in rels if r["type_name"]=="PAGEOFF12" and r["symbol_name"]==pair_symbol and addr(r)>victim and r["index"] != int("'"${pair_pageoff_index}"'")]; pageoff.sort(key=lambda r: abs(addr(r)-victim)); vals=[addr(r) for r in page21[:3]]+[addr(r) for r in pageoff[:3]]; print(" ".join(str(v) for v in vals))'
          )"
          set -- ${extra_addresses}
          prior_page21_addr_1="$1"
          prior_page21_addr_2="$2"
          prior_page21_addr_3="$3"
          later_pageoff_addr_1="$4"
          later_pageoff_addr_2="$5"
          later_pageoff_addr_3="$6"
          {
            printf 'prior_page21_addr_1=0x%x\n' "${prior_page21_addr_1}"
            printf 'prior_page21_addr_2=0x%x\n' "${prior_page21_addr_2}"
            printf 'prior_page21_addr_3=0x%x\n' "${prior_page21_addr_3}"
            printf 'later_pageoff_addr_1=0x%x\n' "${later_pageoff_addr_1}"
            printf 'later_pageoff_addr_2=0x%x\n' "${later_pageoff_addr_2}"
            printf 'later_pageoff_addr_3=0x%x\n' "${later_pageoff_addr_3}"
          } | tee "${diag}/selected-extra-addresses.log"

          pair_addresses="$(
            python3 -c 'import json; d=json.load(open("'"${diag}/reloc-context.json"'")); victim=int(d["victim_section_addr"],16); orig21=int("'"${pair_page21_index}"'"); origoff=int("'"${pair_pageoff_index}"'"); pairs=[p for p in d["candidate_page21_pageoff_pairs"] if p["symbol"]=="'"${pair_symbol}"'" and p["matched_base_reg"] and not (p["page21_index"]==orig21 and p["pageoff_index"]==origoff)]; addr=lambda x:int(x,16); pairs.sort(key=lambda p: (abs(p["page21_delta"])+abs(p["pageoff_delta"]), abs(p["pageoff_delta"]))); vals=[]; [vals.extend([addr(p["page21_addr"]), addr(p["pageoff_addr"])]) for p in pairs[:3]]; print(" ".join(str(v) for v in vals))'
          )"
          set -- ${pair_addresses}
          pair_move_page21_addr_1="$1"
          pair_move_pageoff_addr_1="$2"
          pair_move_page21_addr_2="$3"
          pair_move_pageoff_addr_2="$4"
          pair_move_page21_addr_3="$5"
          pair_move_pageoff_addr_3="$6"
          {
            printf 'pair_move_page21_addr_1=0x%x\n' "${pair_move_page21_addr_1}"
            printf 'pair_move_pageoff_addr_1=0x%x\n' "${pair_move_pageoff_addr_1}"
            printf 'pair_move_page21_addr_2=0x%x\n' "${pair_move_page21_addr_2}"
            printf 'pair_move_pageoff_addr_2=0x%x\n' "${pair_move_pageoff_addr_2}"
            printf 'pair_move_page21_addr_3=0x%x\n' "${pair_move_page21_addr_3}"
            printf 'pair_move_pageoff_addr_3=0x%x\n' "${pair_move_pageoff_addr_3}"
          } | tee "${diag}/selected-pair-move-addresses.log"

          make_address_variant() {
            local label="$1"
            shift
            local out_dir="${diag}/variants/${label}"
            mkdir -p "${out_dir}"
            if [ "$#" -eq 0 ]; then
              cp "${selected_obj}" "${out_dir}/input.o"
              echo '{"changes":[]}' > "${out_dir}/address-patch.json"
              return 0
            fi
            python3 ../harness/.github/scripts/patch_macho_reloc_addresses.py \
              --input "${selected_obj}" \
              --output "${out_dir}/input.o" \
              --out-json "${out_dir}/address-patch.json" \
              "$@" \
              2>&1 | tee "${out_dir}/address-patch.log"
          }

          relink_variant() {
            local label="$1"
            local out_dir="${diag}/variants/${label}"
            local obj="${out_dir}/input.o"
            local manual_bin_abs="$(pwd)/${out_dir}/nistkats.manual"
            local manual_map="${out_dir}/nistkats.manual.map"
            local manual_link_log="${out_dir}/link.log"
            local args=(
              -arch arm64
              -nodefaultlibs
              -o "${manual_bin_abs}"
              "${obj}"
              "${compiler_builtins}"
              -L "$(pwd)/target/release/deps"
              -L "${rustlib}"
              -liconv
              -lSystem
              -lc
              -lm
              -Wl,-dead_strip
              -Wl,-map,"${manual_map}"
            )
            {
              printf 'DEVELOPER_DIR=%q xcrun cc' "${DEVELOPER_DIR}"
              printf ' %q' "${args[@]}"
              echo
            } | tee "${out_dir}/command.log"
            if DEVELOPER_DIR="${DEVELOPER_DIR}" xcrun cc "${args[@]}" > "${manual_link_log}" 2>&1; then
              echo "manual_link_status=0" | tee "${out_dir}/meta.log"
            else
              status=$?
              echo "manual_link_status=${status}" | tee "${out_dir}/meta.log"
              return 0
            fi
            python3 ../harness/.github/scripts/scan_pr287_bad_word.py \
              --root "${out_dir}" \
              --bin "${manual_bin_abs}" \
              --pattern-words "${pattern_words}" \
              --bad-word 0x4e803241 \
              --bad-index 8 \
              --out "${out_dir}/scan.json" \
              2>&1 | tee "${out_dir}/scan.log"
          }

          set_addr_arg() {
            local idx="$1"
            local addr="$2"
            printf -- '--set=%s=0x%x' "${idx}" "${addr}"
          }

          set_word_arg() {
            local addr="$1"
            local word="$2"
            printf -- '--word=0x%x=%s' "${addr}" "${word}"
          }

          make_address_variant original
          make_address_variant pageoff_v_p400 "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x400)))"
          make_address_variant pageoff_v_p800 "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x800)))"
          make_address_variant pageoff_v_pc00_m4 "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00 - 4)))"
          make_address_variant pageoff_v_pc00_p4 "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00 + 4)))"
          make_address_variant pageoff_v_p1000 "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x1000)))"
          make_address_variant pageoff_v_p1400 "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x1400)))"
          make_address_variant page21_v_m210 "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x210)))"
          make_address_variant page21_v_m300 "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))"
          make_address_variant page21_v_m340 "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x340)))"
          make_address_variant page21_v_m380 "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x380)))"
          make_address_variant page21_existing_prior_1 "$(set_addr_arg "${pair_page21_index}" "${prior_page21_addr_1}")"
          make_address_variant page21_existing_prior_2 "$(set_addr_arg "${pair_page21_index}" "${prior_page21_addr_2}")"
          make_address_variant page21_existing_prior_3 "$(set_addr_arg "${pair_page21_index}" "${prior_page21_addr_3}")"
          make_address_variant pageoff_existing_later_1 "$(set_addr_arg "${pair_pageoff_index}" "${later_pageoff_addr_1}")"
          make_address_variant pageoff_existing_later_2 "$(set_addr_arg "${pair_pageoff_index}" "${later_pageoff_addr_2}")"
          make_address_variant pageoff_existing_later_3 "$(set_addr_arg "${pair_pageoff_index}" "${later_pageoff_addr_3}")"
          make_address_variant pair_existing_move_1 \
            "$(set_addr_arg "${pair_page21_index}" "${pair_move_page21_addr_1}")" \
            "$(set_addr_arg "${pair_pageoff_index}" "${pair_move_pageoff_addr_1}")"
          make_address_variant pair_existing_move_2 \
            "$(set_addr_arg "${pair_page21_index}" "${pair_move_page21_addr_2}")" \
            "$(set_addr_arg "${pair_pageoff_index}" "${pair_move_pageoff_addr_2}")"
          make_address_variant pair_existing_move_3 \
            "$(set_addr_arg "${pair_page21_index}" "${pair_move_page21_addr_3}")" \
            "$(set_addr_arg "${pair_pageoff_index}" "${pair_move_pageoff_addr_3}")"
          make_address_variant pair_word_v_m100_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x100)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x100)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m180_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x180)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x180)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m200_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x200)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x200)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m210_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x210)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x210)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m2fc_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x2fc)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x2fc)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m300_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x300)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m304_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x304)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x304)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m340_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x340)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x340)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m380_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x380)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x380)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          for page21_delta_hex in 384 388 38c 390 394 398 39c 3a0 3b0 3c0 3d0 3e0 3f0 3f4 3f8 3fc; do
            page21_delta=$((16#${page21_delta_hex}))
            make_address_variant "pair_word_v_m${page21_delta_hex}_pc00" \
              "$(set_addr_arg "${pair_page21_index}" $((victim_addr - page21_delta)))" \
              "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
              "$(set_word_arg $((victim_addr - page21_delta)) 0x90000000)" \
              "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          done
          make_address_variant pair_word_v_m400_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x400)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x400)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          for page21_delta_hex in 404 408 40c 410 420 440 460 480; do
            page21_delta=$((16#${page21_delta_hex}))
            make_address_variant "pair_word_v_m${page21_delta_hex}_pc00" \
              "$(set_addr_arg "${pair_page21_index}" $((victim_addr - page21_delta)))" \
              "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
              "$(set_word_arg $((victim_addr - page21_delta)) 0x90000000)" \
              "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          done
          make_address_variant pair_word_v_m500_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x500)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x500)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m600_pc00 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x600)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x600)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)"
          make_address_variant pair_word_v_m300_p400 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x400)))" \
            "$(set_word_arg $((victim_addr - 0x300)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0x400)) 0x3dc00000)"
          make_address_variant pair_word_v_m300_p800 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x800)))" \
            "$(set_word_arg $((victim_addr - 0x300)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0x800)) 0x3dc00000)"
          make_address_variant pair_word_v_m300_pbfc \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xbfc)))" \
            "$(set_word_arg $((victim_addr - 0x300)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xbfc)) 0x3dc00000)"
          make_address_variant pair_word_v_m300_pc04 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc04)))" \
            "$(set_word_arg $((victim_addr - 0x300)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc04)) 0x3dc00000)"
          make_address_variant pair_word_v_m300_p1000 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x1000)))" \
            "$(set_word_arg $((victim_addr - 0x300)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0x1000)) 0x3dc00000)"
          make_address_variant pair_word_v_m300_p1400 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x1400)))" \
            "$(set_word_arg $((victim_addr - 0x300)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0x1400)) 0x3dc00000)"
          make_address_variant pair_word_v_m300_p1800 \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x300)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0x1800)))" \
            "$(set_word_arg $((victim_addr - 0x300)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0x1800)) 0x3dc00000)"
          for combo in 3fc:400 3fc:1800 400:400 400:800 400:1800 404:400 404:800 404:1800 410:400; do
            page21_delta_hex="${combo%%:*}"
            pageoff_delta_hex="${combo##*:}"
            page21_delta=$((16#${page21_delta_hex}))
            pageoff_delta=$((16#${pageoff_delta_hex}))
            make_address_variant "pair_word_v_m${page21_delta_hex}_p${pageoff_delta_hex}" \
              "$(set_addr_arg "${pair_page21_index}" $((victim_addr - page21_delta)))" \
              "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + pageoff_delta)))" \
              "$(set_word_arg $((victim_addr - page21_delta)) 0x90000000)" \
              "$(set_word_arg $((victim_addr + pageoff_delta)) 0x3dc00000)"
          done
          for page21_delta_hex in 3fc 400 404; do
            page21_delta=$((16#${page21_delta_hex}))
            make_address_variant "pair_word_v_m${page21_delta_hex}_pc00_victim_nop" \
              "$(set_addr_arg "${pair_page21_index}" $((victim_addr - page21_delta)))" \
              "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
              "$(set_word_arg $((victim_addr - page21_delta)) 0x90000000)" \
              "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)" \
              "$(set_word_arg "${victim_addr}" 0xd503201f)"
          done
          make_address_variant pair_word_v_m3fc_pc00_victim_zero \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x3fc)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x3fc)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)" \
            "$(set_word_arg "${victim_addr}" 0x00000000)"
          make_address_variant pair_word_v_m3fc_pc00_victim_movz \
            "$(set_addr_arg "${pair_page21_index}" $((victim_addr - 0x3fc)))" \
            "$(set_addr_arg "${pair_pageoff_index}" $((victim_addr + 0xc00)))" \
            "$(set_word_arg $((victim_addr - 0x3fc)) 0x90000000)" \
            "$(set_word_arg $((victim_addr + 0xc00)) 0x3dc00000)" \
            "$(set_word_arg "${victim_addr}" 0x52800000)"

          for variant_dir in "${diag}/variants"/*; do
            relink_variant "$(basename "${variant_dir}")"
          done

          python3 - "${diag}/variants" "${diag}/address-sweep-summary.json" "${diag}/address-sweep-summary.md" <<'PY'
          import json
          import sys
          from pathlib import Path

          variants = Path(sys.argv[1])
          out_json = Path(sys.argv[2])
          out_md = Path(sys.argv[3])

          def load(path, default):
              return json.loads(path.read_text()) if path.exists() else default

          def first_executable(scan):
              entries = [
                  e for e in scan.get("interesting_files", [])
                  if "Mach-O 64-bit executable" in e.get("kind", "")
              ]
              return sorted(entries, key=lambda e: len(e.get("path", "")))[0] if entries else None

          rows = []
          for variant in sorted(p for p in variants.iterdir() if p.is_dir()):
              patch = load(variant / "address-patch.json", {"changes": []})
              scan = load(variant / "scan.json", {"interesting_files": []})
              entry = first_executable(scan)
              matches = entry.get("wildcard_context_matches", []) if entry else []
              word = matches[0]["wildcard_word"] if matches else None
              meta = ""
              meta_path = variant / "meta.log"
              if meta_path.exists():
                  for line in meta_path.read_text(errors="replace").splitlines():
                      if line.startswith("manual_link_status="):
                          meta = line.split("=", 1)[1]
              changes = patch.get("changes", [])
              rows.append({
                  "variant": variant.name,
                  "changes": changes,
                  "word_changes": patch.get("word_changes", []),
                  "final_context_word": word,
                  "payload_bits_21_10": None if word is None else f"0x{((int(word,16) >> 10) & 0xfff):03x}",
                  "exact_bad_word_count": None if entry is None else entry.get("exact_bad_word_count"),
                  "wildcard_context_match_count": None if entry is None else entry.get("wildcard_context_match_count"),
                  "manual_link_status": meta,
              })

          out_json.write_text(json.dumps({"rows": rows}, indent=2, sort_keys=True) + "\n")
          lines = [
              "# PR287 relocation address sweep summary",
              "",
              "| Variant | Address changes | Final word | bits[21:10] | Exact bad count | Link status |",
              "| --- | --- | --- | ---: | ---: | ---: |",
          ]
          for row in rows:
              word_changes = "; ".join(
                  f"word {c['address']} {c['old_word']}->{c['new_word']}"
                  for c in row["word_changes"]
              )
              changes = "; ".join(
                  f"rel[{c['relocation_index']}] {c['type_name']} {c['old_address']}->{c['new_address']}"
                  for c in row["changes"]
              )
              if word_changes:
                  changes = f"{changes}; {word_changes}" if changes else word_changes
              lines.append(
                  f"| {row['variant']} | `{changes}` | `{row['final_context_word']}` | "
                  f"`{row['payload_bits_21_10']}` | {row['exact_bad_word_count']} | {row['manual_link_status']} |"
              )
          lines.append("")
          out_md.write_text("\n".join(lines))
          print(out_md.read_text())
          PY

          {
            echo "# PR287 relocation address sweep"
            echo
            echo "## selected pair"
            cat "${diag}/selected-pair.log"
            echo
            echo "## selected extra addresses"
            cat "${diag}/selected-extra-addresses.log"
            echo
            echo "## selected pair-move addresses"
            cat "${diag}/selected-pair-move-addresses.log"
            echo
            echo "## address sweep"
            cat "${diag}/address-sweep-summary.md"
          } | tee "${diag}/summary.md"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-rej-public-xcode-pr287-scalar-guard-reloc-address
          path: |
            libcrux/neon-rej-diagnostics/**/*.json
            libcrux/neon-rej-diagnostics/**/*.log
            libcrux/neon-rej-diagnostics/**/*.md
            libcrux/neon-rej-diagnostics/**/*.txt
